
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Novels Baltigo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg:         #08090d;
      --bg2:        #101217;
      --bg3:        #171a21;
      --surface:    rgba(20, 22, 28, 0.94);
      --surface2:   rgba(28, 31, 39, 0.96);
      --border:     rgba(160, 166, 178, 0.16);
      --border2:    rgba(202, 172, 96, 0.28);
      --text:       #f3f4f0;
      --muted:      #9298a3;
      --soft:       #dde0e7;
      --ink:        #15171c;
      --purple:     #9aa0ab;
      --purple2:    #6f7682;
      --violet:     #e4e0d2;
      --gold:       #f0c060;
      --gold2:      #c89030;
      --teal:       #4de8c8;
      --crimson:    #e84d6e;
      --radius-sm:  10px;
      --radius:     18px;
      --radius-lg:  26px;
      --shadow:     0 32px 80px rgba(0, 0, 0, 0.60);
      --shadow-sm:  0 8px 32px rgba(0, 0, 0, 0.40);
      --glow:       0 0 34px rgba(210, 170, 90, 0.16);
      font-family: 'DM Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Atmospheric Background ─── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(196, 156, 76, 0.08), transparent 220px),
        linear-gradient(165deg, #08090d 0%, #13161d 48%, #090a0f 100%);
      z-index: 0;
    }

    /* Particle/grain overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100%, 1000px);
      margin: 0 auto;
      padding: 0 12px 110px;
    }

    button, input { font: inherit; border: 0; outline: none; }
    button { cursor: pointer; -webkit-tap-highlight-color: transparent; color: inherit; }
    button:disabled { cursor: default; opacity: 0.4; }
    img { max-width: 100%; display: block; }

    /* ─── TOPBAR ─── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: grid;
      grid-template-columns: 50px 1fr 50px;
      align-items: center;
      gap: 10px;
      padding: 14px 0 12px;
      background: linear-gradient(180deg, rgba(6,5,14,0.98) 0%, rgba(6,5,14,0.85) 80%, transparent 100%);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
    }

    .brand { text-align: center; }

    .brand-name {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--violet) 0%, var(--gold) 55%, var(--violet) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 4s ease infinite;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    @keyframes shimmerText {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: var(--radius-sm);
      background: rgba(138, 110, 255, 0.08);
      border: 1px solid var(--border);
      font-size: 22px;
      color: var(--soft);
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .icon-btn:active { transform: scale(0.93); background: rgba(138, 110, 255, 0.16); }

    /* ─── SEARCH ─── */
    .search {
      display: grid;
      grid-template-columns: 1fr 54px;
      gap: 8px;
      margin: 4px 0 24px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap::before {
      content: "⌕";
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--muted);
      pointer-events: none;
      z-index: 1;
    }

    .search input {
      width: 100%;
      height: 54px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 16px 0 44px;
      color: var(--text);
      background: rgba(16, 14, 32, 0.88);
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(10px);
    }

    .search input::placeholder { color: var(--muted); }

    .search input:focus {
      border-color: rgba(155, 109, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(155, 109, 255, 0.12), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .btn-search {
      width: 54px;
      height: 54px;
      border-radius: var(--radius);
      font-size: 20px;
      background: linear-gradient(135deg, var(--purple2), #4a2ab0);
      box-shadow: 0 8px 24px rgba(124, 77, 232, 0.4);
      transition: all 0.2s ease;
    }

    .btn-search:active { transform: scale(0.93); box-shadow: 0 4px 12px rgba(124, 77, 232, 0.3); }

    /* ─── SECTIONS ─── */
    h2, h3 { font-family: 'Cinzel', serif; }

    .section { margin: 0 0 32px; animation: fadeUp 0.4s ease both; }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 14px;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--soft);
      letter-spacing: 0.02em;
    }

    .section-count {
      font-size: 12px;
      color: var(--muted);
      background: rgba(138, 110, 255, 0.12);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 10px;
    }

    /* ─── RAIL ─── */
    .rail {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(154px, 32%);
      gap: 12px;
      overflow-x: auto;
      padding: 2px 2px 10px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .rail::-webkit-scrollbar { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    /* ─── CARD ─── */
    .card {
      position: relative;
      border-radius: var(--radius);
      background: linear-gradient(170deg, rgba(24, 20, 48, 0.96), rgba(14, 12, 28, 0.96));
      border: 1px solid var(--border);
      overflow: hidden;
      scroll-snap-align: start;
      text-align: left;
      box-shadow: var(--shadow-sm);
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      animation: cardPop 0.35s ease both;
    }

    .card:active {
      transform: scale(0.96);
      border-color: rgba(155, 109, 255, 0.4);
      box-shadow: var(--glow), var(--shadow-sm);
    }

    /* Card shine sweep */
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .card:active::after { opacity: 1; }

    .cover-wrap {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(80, 40, 180, 0.3), rgba(20, 10, 60, 0.6));
    }

    .cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card:active .cover { transform: scale(1.04); }

    .cover-fallback {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 16px;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--violet);
      background: linear-gradient(135deg, #1a0e3a 0%, #0d0a1e 60%, #12082a 100%);
    }

    /* Cover vignette */
    .cover-wrap::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 65%;
      background: linear-gradient(to top, rgba(8,6,20,0.92) 0%, transparent 100%);
      pointer-events: none;
    }

    .cap-badge {
      position: absolute;
      bottom: 8px;
      left: 8px;
      z-index: 1;
      padding: 4px 10px;
      border-radius: 99px;
      background: rgba(155, 109, 255, 0.22);
      border: 1px solid rgba(155, 109, 255, 0.35);
      color: var(--violet);
      font-size: 11px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      letter-spacing: 0.04em;
    }

    .card-body { padding: 11px 12px 13px; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.28;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      color: var(--soft);
      min-height: 36px;
    }

    .card-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-meta::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--purple);
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* ─── SPOTLIGHT ─── */
    .spotlight {
      position: relative;
      display: grid;
      min-height: 300px;
      overflow: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border2);
      background: var(--bg3);
      box-shadow: var(--shadow), var(--glow);
      animation: fadeUp 0.45s ease both;
      text-align: left;
      margin-bottom: 28px;
      cursor: pointer;
    }

    .spotlight-bg {
      grid-area: 1/1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.2) brightness(0.5);
      transform: scale(1.03);
      transition: transform 0.5s ease;
    }

    .spotlight:active .spotlight-bg { transform: scale(1.0); }

    .spotlight-fallback {
      grid-area: 1/1;
      background: linear-gradient(135deg, #2a1060, #0e0830 55%, #0a081c);
    }

    /* Multi-layer overlay for cinematic effect */
    .spotlight-overlay {
      grid-area: 1/1;
      background:
        linear-gradient(to right, rgba(6,4,18,0.85) 0%, transparent 60%),
        linear-gradient(to top, rgba(6,4,18,0.95) 0%, transparent 55%);
      pointer-events: none;
    }

    .spotlight-info {
      grid-area: 1/1;
      align-self: end;
      padding: 24px 22px;
      position: relative;
      z-index: 2;
    }

    .spotlight-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .spotlight-eyebrow::before {
      content: "";
      width: 18px;
      height: 2px;
      background: var(--gold);
      border-radius: 1px;
    }

    .spotlight-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 8vw, 52px);
      font-weight: 900;
      line-height: 0.95;
      color: var(--text);
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      max-width: 82%;
    }

    .spotlight-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 11px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      letter-spacing: 0.03em;
    }

    .chip-default {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--soft);
    }

    .chip-purple {
      background: rgba(155, 109, 255, 0.2);
      border: 1px solid rgba(155, 109, 255, 0.35);
      color: var(--violet);
    }

    .chip-gold {
      background: rgba(240, 192, 96, 0.15);
      border: 1px solid rgba(240, 192, 96, 0.3);
      color: var(--gold);
    }

    /* ─── DETAIL ─── */
    .detail { display: grid; gap: 16px; animation: fadeUp 0.32s ease both; }

    .detail-hero {
      position: relative;
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 16px;
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border2);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .detail-hero-blur {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(30px) saturate(1.3) brightness(0.35);
      transform: scale(1.15);
      opacity: 0.6;
    }

    .detail-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(12,8,30,0.7) 0%, rgba(8,6,18,0.5) 100%);
    }

    .poster {
      position: relative;
      z-index: 1;
      width: 110px;
      aspect-ratio: 3/4;
      border-radius: var(--radius);
      object-fit: cover;
      border: 1px solid var(--border2);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .poster-fallback {
      position: relative;
      z-index: 1;
      width: 110px;
      aspect-ratio: 3/4;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: linear-gradient(135deg, #1e0c44, #0d0825);
      display: grid;
      place-items: center;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--violet);
      text-align: center;
      padding: 10px;
    }

    .detail-info {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .detail-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(20px, 5.5vw, 36px);
      font-weight: 900;
      line-height: 1.05;
      color: var(--text);
      overflow-wrap: anywhere;
      margin-bottom: 10px;
    }

    .detail-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    /* ─── ACTIONS ─── */
    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .action {
      min-height: 46px;
      border-radius: var(--radius-sm);
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(138, 110, 255, 0.1);
      border: 1px solid var(--border);
      transition: all 0.18s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    .action:active { transform: scale(0.96); }

    .action.hot {
      background: linear-gradient(135deg, #7c2de8, #5a1faa);
      border-color: rgba(155, 109, 255, 0.4);
      color: #fff;
      box-shadow: 0 8px 24px rgba(124, 45, 232, 0.35);
    }

    .action.good {
      background: linear-gradient(135deg, #0e5e3a, #1aaa6a);
      border-color: rgba(78, 210, 140, 0.3);
      color: #fff;
    }

    .action.blue {
      background: linear-gradient(135deg, #0e3d6e, #1a7acc);
      border-color: rgba(78, 160, 240, 0.3);
      color: #fff;
    }

    /* ─── SYNOPSIS ─── */
    .synopsis-box {
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(12, 10, 26, 0.7);
      backdrop-filter: blur(10px);
    }

    .synopsis-label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 10px;
    }

    .synopsis {
      color: var(--soft);
      font-size: 15px;
      line-height: 1.78;
      font-weight: 300;
    }

    .synopsis.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .text-btn {
      margin-top: 12px;
      padding: 0;
      color: var(--violet);
      background: transparent;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* ─── CHAPTER LIST ─── */
    .chapters-panel {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      background: rgba(12, 10, 26, 0.6);
    }

    .chapters-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(20, 16, 42, 0.8);
    }

    .chapters-title-row {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--soft);
    }

    .chapter-tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .chapter-tools input {
      height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      padding: 0 12px;
      color: var(--text);
      background: rgba(16, 14, 32, 0.9);
      font-size: 14px;
      transition: border-color 0.18s;
    }

    .chapter-tools input:focus { border-color: rgba(155, 109, 255, 0.5); }

    .chapter-list { display: grid; }

    .chapter-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 58px;
      padding: 10px 16px;
      text-align: left;
      background: transparent;
      border-bottom: 1px solid rgba(138, 110, 255, 0.07);
      transition: background 0.15s ease;
      animation: rowIn 0.3s ease both;
    }

    .chapter-row:last-child { border-bottom: 0; }
    .chapter-row:active { background: rgba(155, 109, 255, 0.08); }

    .chapter-num {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: var(--purple);
      background: rgba(155, 109, 255, 0.1);
      border: 1px solid rgba(155, 109, 255, 0.15);
      flex-shrink: 0;
    }

    .chapter-info strong {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: var(--soft);
      line-height: 1.2;
    }

    .chapter-info span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .chapter-arrow {
      color: rgba(155, 109, 255, 0.5);
      font-size: 18px;
      font-weight: 900;
    }

    /* ─── LOADING / EMPTY / ERROR ─── */
    .loading, .empty, .error-box {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      border-radius: var(--radius-lg);
      background: rgba(16, 14, 32, 0.7);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .loading-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
      animation: spinY 2s linear infinite;
    }

    @keyframes spinY {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .loading-text {
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .loading::after {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, var(--purple), var(--violet), transparent);
      animation: loadBar 1.5s ease infinite;
    }

    @keyframes loadBar {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.5; }
    .empty-text { font-size: 15px; }
    .empty-sub  { font-size: 13px; color: var(--muted); margin-top: 6px; }

    /* ─── SKELETON ─── */
    .skeleton-rail {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(154px, 32%);
      gap: 12px;
      overflow: hidden;
    }

    .skeleton {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
    }

    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 35%, rgba(155, 109, 255, 0.07) 50%, transparent 65%);
      transform: translateX(-100%);
      animation: skeletonShimmer 1.4s infinite;
    }

    @keyframes skeletonShimmer {
      to { transform: translateX(100%); }
    }

    /* ─── READER ─── */
    .reader-mode .search,
    .reader-mode .bottom-nav { display: none; }
    .reader-mode .app { padding-bottom: 16px; }

    .reader { display: grid; gap: 14px; animation: fadeUp 0.28s ease both; }

    .reader-head {
      position: sticky;
      top: 80px;
      z-index: 20;
      padding: 14px;
      border-radius: var(--radius);
      background: rgba(10, 8, 22, 0.94);
      border: 1px solid var(--border2);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-sm);
    }

    .reader-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 4px;
    }

    .reader-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--soft);
      line-height: 1.2;
    }

    .reader-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-bar {
      height: 4px;
      margin-top: 10px;
      border-radius: 99px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--purple), var(--gold));
      transition: width 0.25s ease;
    }

    .reader-tools {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .tool {
      height: 34px;
      min-width: 40px;
      border-radius: 9px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(138, 110, 255, 0.1);
      border: 1px solid var(--border);
      color: var(--soft);
      transition: all 0.15s;
    }

    .tool:active { background: rgba(138, 110, 255, 0.22); transform: scale(0.95); }

    .reader-page {
      padding: 26px 20px;
      border-radius: var(--radius-lg);
      background: rgba(248, 244, 234, 0.97);
      color: #1e1a14;
      box-shadow: var(--shadow);
      min-height: calc(100vh - 280px);
    }

    .reader-page.dark {
      background: rgba(10, 8, 20, 0.96);
      color: #d8d4ee;
      border: 1px solid var(--border);
    }

    .reader-page p {
      font-size: var(--reader-font, 18px);
      line-height: 1.88;
      margin: 0 0 1.1em;
      font-weight: 300;
    }

    .reader-page.continuous {
      scroll-margin-top: 90px;
    }

    .reader-page.dark p { font-weight: 300; }

    /* Drop cap for first paragraph */
    .reader-page p:first-child::first-letter {
      font-family: 'Cinzel', serif;
      font-size: 3.4em;
      font-weight: 900;
      float: left;
      line-height: 0.78;
      margin: 0.06em 0.08em 0 0;
      color: var(--purple2);
    }

    .reader-page.dark p:first-child::first-letter { color: var(--violet); }

    .reader-controls {
      position: sticky;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: var(--radius);
      background: rgba(10, 8, 22, 0.94);
      border: 1px solid var(--border2);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow), var(--glow);
    }

    .reader-pct {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
    }

    .news-list {
      display: grid;
      gap: 12px;
    }

    .news-card {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      width: 100%;
      padding: 12px;
      text-align: left;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(28, 31, 39, 0.96), rgba(15, 17, 22, 0.96));
      box-shadow: var(--shadow-sm);
      animation: fadeUp 0.28s ease both;
    }

    .news-thumb, .news-thumb-fallback {
      width: 92px;
      aspect-ratio: 4 / 5;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255,255,255,0.06);
    }

    .news-thumb-fallback {
      display: grid;
      place-items: center;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 22px;
      border: 1px solid var(--border);
    }

    .news-title {
      color: var(--soft);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }

    .news-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .news-excerpt {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 60;
      transform: translateX(-50%);
      width: min(calc(100% - 20px), 520px);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      padding: 6px;
      border-radius: 22px;
      background: rgba(10, 8, 22, 0.96);
      border: 1px solid var(--border2);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      box-shadow: var(--shadow), var(--glow);
    }

    .tab-btn {
      min-width: 0;
      height: 56px;
      border-radius: 16px;
      display: inline-flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: all 0.2s ease;
    }

    .tab-btn b {
      font-size: 19px;
      line-height: 1;
    }

    .tab-btn.active {
      color: var(--gold);
      background: rgba(202, 144, 48, 0.14);
      border-color: rgba(202, 144, 48, 0.28);
    }

    .tab-btn:active { transform: scale(0.94); }

    /* ─── PROFILE STATS ─── */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat {
      padding: 18px 16px;
      border-radius: var(--radius);
      background: linear-gradient(170deg, rgba(24, 20, 52, 0.94), rgba(14, 12, 30, 0.94));
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .stat-value {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--violet);
      display: block;
    }

    .stat-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Ornamental divider */
    .ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 16px;
      color: rgba(155, 109, 255, 0.3);
      font-size: 12px;
    }
    .ornament::before, .ornament::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(155, 109, 255, 0.25), transparent);
    }

    /* History row */
    .history-row {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(138, 110, 255, 0.06);
      transition: background 0.15s;
      animation: rowIn 0.28s ease both;
    }

    .history-row:last-child { border-bottom: 0; }
    .history-row:active { background: rgba(155, 109, 255, 0.06); }

    .history-thumb {
      width: 48px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      background: rgba(155, 109, 255, 0.12);
    }

    .history-thumb-fallback {
      width: 48px;
      height: 64px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(80, 40, 180, 0.3), rgba(20, 10, 60, 0.5));
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    /* Retry button in errors */
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--purple2), #4a2ab0);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(124, 77, 232, 0.35);
      transition: all 0.18s;
    }
    .retry-btn:active { transform: scale(0.95); }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (min-width: 760px) {
      .app { padding-top: 18px; }
      .rail { grid-auto-columns: minmax(160px, 20%); }
      .skeleton-rail { grid-auto-columns: minmax(160px, 20%); }
      .actions { grid-template-columns: repeat(4, 1fr); }
      .stats { grid-template-columns: repeat(4, 1fr); }
      .detail-hero { grid-template-columns: 150px 1fr; }
      .poster { width: 150px; }
      .poster-fallback { width: 150px; }
      .reader-page { padding: 40px 52px; }
      .spotlight { min-height: 380px; }
    }

    @media (max-width: 390px) {
      .brand-name { font-size: 17px; }
      .rail { grid-auto-columns: minmax(138px, 44%); }
      .grid { grid-template-columns: repeat(auto-fill, minmax(138px, 1fr)); }
      .detail-hero { grid-template-columns: 90px 1fr; }
      .poster, .poster-fallback { width: 90px; }
      .actions { grid-template-columns: 1fr; }
      .action { min-height: 44px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="icon-btn" id="backBtn" title="Voltar">‹</button>
      <div class="brand">
        <div class="brand-name">Novels Baltigo</div>
        <div class="brand-sub" id="subtitle">Início</div>
      </div>
      <button class="icon-btn" id="refreshBtn" title="Atualizar">↻</button>
    </header>

    <form class="search" id="searchForm">
      <div class="search-wrap">
        <input id="searchInput" autocomplete="off" placeholder="Buscar novel, título, gênero…">
      </div>
      <button class="btn-search" type="submit" title="Buscar">⌕</button>
    </form>

    <section id="view"></section>
  </main>

  <nav class="bottom-nav">
    <button class="tab-btn active" data-tab="home"><b>⌂</b><span>Início</span></button>
    <button class="tab-btn" data-tab="news"><b>N</b><span>Noticias</span></button>
    <button class="tab-btn" data-tab="history"><b>◴</b><span>Histórico</span></button>
    <button class="tab-btn" data-tab="favorites"><b>★</b><span>Favoritos</span></button>
    <button class="tab-btn" data-tab="profile"><b>☻</b><span>Perfil</span></button>
  </nav>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }

    const qs = new URLSearchParams(location.search);
    const apiBase = location.origin;
    const user = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : {};
    const userId = String(qs.get("user_id") || user.id || "guest");
    const state = {
      route: qs.get("route") || (qs.get("chapter_id") ? "reader" : qs.get("title_id") ? "detail" : "home"),
      titleId: qs.get("title_id") || qs.get("id") || qs.get("novel_id") || "",
      chapterId: qs.get("chapter_id") || qs.get("read") || qs.get("cap") || "",
      currentTitle: null,
      currentChapter: null,
      currentParagraphs: [],
      scrollPercent: 0,
      saveTimer: null,
      readerFont: Number(localStorage.getItem("novel_reader_font") || 18),
      readerDark: localStorage.getItem("novel_reader_dark") === "1"
    };

    const view       = document.getElementById("view");
    const subtitle   = document.getElementById("subtitle");
    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const backBtn    = document.getElementById("backBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const storage = {
      get(key, fallback) {
        try { const v = JSON.parse(localStorage.getItem(key)); return v ?? fallback; }
        catch (_) { return fallback; }
      },
      set(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
    };

    const localProgressKey  = `novel_progress:${userId}`;
    const localFavoritesKey = `novel_favorites:${userId}`;

    function escapeHtml(v) {
      return String(v || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
    }

    async function api(path, options = {}) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), options.timeout || 18000);
      try {
        const res = await fetch(`${apiBase}${path}`, {
          headers: { "Content-Type": "application/json" },
          cache: "no-store",
          ...options,
          signal: controller.signal
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        return res.json();
      } catch (err) {
        if (err.name === "AbortError") throw new Error("Demorou demais para carregar. Tente de novo.");
        throw err;
      } finally {
        clearTimeout(timeout);
      }
    }

    function chapterNumberText(v) {
      if (!v) return "";
      if (typeof v === "object") return v.chapter_number || v.chapter_id || "";
      return v;
    }

    function coverOf(item) {
      return item.cover_url || item.background_url || item.banner_url || "";
    }

    function setRoute(route, label) {
      state.route = route;
      subtitle.textContent = label || route;
      document.body.classList.toggle("reader-mode", route === "reader");
      if (route !== "reader") window.removeEventListener("scroll", onReaderScroll);
    }

    /* ── Loading states ── */
    function skeletonHome() {
      const skels = Array(5).fill(0).map((_, i) =>
        `<div class="skeleton" style="height:240px;animation-delay:${i*60}ms"></div>`
      ).join("");
      view.innerHTML = `
        <div style="height:240px;border-radius:26px;margin-bottom:28px;position:relative;overflow:hidden;background:rgba(255,255,255,0.03);border:1px solid var(--border)">
          <div class="skeleton" style="height:100%;border-radius:0;border:0"></div>
        </div>
        <div class="section">
          <div class="ornament">✦</div>
          <div class="skeleton-rail">${skels}</div>
        </div>`;
    }

    function setLoading(text = "Carregando") {
      view.innerHTML = `
        <div class="loading">
          <span class="loading-icon">📖</span>
          <div class="loading-text">${escapeHtml(text)}…</div>
        </div>`;
    }

    function emptyHtml(text, sub = "", action = "") {
      return `<div class="empty">
        <span class="empty-icon">🌙</span>
        <div class="empty-text">${escapeHtml(text)}</div>
        ${sub ? `<div class="empty-sub">${escapeHtml(sub)}</div>` : ""}
        ${action}
      </div>`;
    }

    function imageOrFallback(src, title, cls = "cover") {
      if (!src) return `<div class="cover-fallback ${cls}">${escapeHtml(title || "Novel")}</div>`;
      return `<img class="${cls}" src="${escapeHtml(src)}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'cover-fallback ${cls}',textContent:'${escapeHtml(title||'Novel').replace(/'/g,"\\'")}'}))">`;
    }

    function card(item, index = 0) {
      const title   = item.display_title || item.title || "Novel";
      const chapter = chapterNumberText(item.latest_chapter || item.chapter_number);
      const cover   = coverOf(item);
      return `
        <button class="card" data-title="${escapeHtml(item.title_id)}" style="animation-delay:${Math.min(index*40, 300)}ms">
          <div class="cover-wrap">
            ${imageOrFallback(cover, title)}
            ${chapter ? `<span class="cap-badge">Cap. ${escapeHtml(chapter)}</span>` : ""}
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(title)}</div>
            <div class="card-meta">${escapeHtml(item.status || item.type || "Novel")}</div>
          </div>
        </button>`;
    }

    function bindCards(root = view) {
      root.querySelectorAll("[data-title]").forEach(btn => {
        btn.addEventListener("click", () => openTitle(btn.dataset.title).catch(showError));
      });
    }

    function railSection(titleText, items) {
      if (!items || !items.length) return "";
      return `
        <div class="section">
          <div class="section-head">
            <h2 class="section-title">${escapeHtml(titleText)}</h2>
            <span class="section-count">${items.length}</span>
          </div>
          <div class="ornament">✦</div>
          <div class="rail">${items.map(card).join("")}</div>
        </div>`;
    }

    function gridSection(titleText, items) {
      if (!items || !items.length) return "";
      return `
        <div class="section">
          <div class="section-head">
            <h2 class="section-title">${escapeHtml(titleText)}</h2>
            <span class="section-count">${items.length}</span>
          </div>
          <div class="ornament">✦</div>
          <div class="grid">${items.map(card).join("")}</div>
        </div>`;
    }

    function spotlight(item) {
      if (!item) return "";
      const title   = item.display_title || item.title || "Novel";
      const cover   = coverOf(item);
      const chapter = chapterNumberText(item.latest_chapter || item.chapter_number);
      return `
        <button class="spotlight" data-title="${escapeHtml(item.title_id)}">
          ${cover
            ? `<img class="spotlight-bg" src="${escapeHtml(cover)}" alt="">`
            : `<div class="spotlight-fallback"></div>`}
          <div class="spotlight-overlay"></div>
          <div class="spotlight-info">
            <div class="spotlight-eyebrow">Destaque</div>
            <h1 class="spotlight-title">${escapeHtml(title)}</h1>
            <div class="spotlight-chips">
              ${chapter ? `<span class="chip chip-purple">Cap. ${escapeHtml(chapter)}</span>` : ""}
              <span class="chip chip-default">${escapeHtml(item.status || "Novel")}</span>
              <span class="chip chip-gold">Abrir obra ›</span>
            </div>
          </div>
        </button>`;
    }

    async function renderHome() {
      setRoute("home", "Inicio");
      setActiveTab("home");
      skeletonHome();
      const data = await api("/api/home?limit=240", { timeout: 30000 });
      const latest  = data.latest_titles || data.recent_titles || [];
      const catalog = data.catalog || data.featured || data.popular || [];
      const hero = latest[0] || catalog[0];
      view.innerHTML = [
        spotlight(hero),
        railSection("Atualizadas agora", latest.slice(hero ? 1 : 0)),
        gridSection(`Catalogo (${data.catalog_count || catalog.length})`, catalog),
      ].join("") || emptyHtml("Nenhuma novel carregada agora.", "Tente atualizar.");
      bindCards();
    }

    function sortChapters(chapters) {
      return [...(chapters || [])].sort((a, b) => {
        const na = parseFloat(String(a.chapter_number || "").replace(",", "."));
        const nb = parseFloat(String(b.chapter_number || "").replace(",", "."));
        if (!isNaN(na) && !isNaN(nb)) return nb - na;
        return String(b.chapter_number || "").localeCompare(String(a.chapter_number || ""));
      });
    }

    function latestChapter(title) {
      const latest = title.latest_chapter;
      if (latest && typeof latest === "object" && latest.chapter_id) return latest;
      if (title.latest_chapter_id) return { chapter_id: title.latest_chapter_id, chapter_number: chapterNumberText(title.latest_chapter) };
      const sorted = sortChapters(title.chapters || []);
      return sorted[0] || null;
    }

    function firstChapter(title) {
      const sorted = sortChapters(title.chapters || []);
      return sorted[sorted.length - 1] || latestChapter(title);
    }

    async function openTitle(titleId) {
      if (!titleId) return;
      setRoute("detail", "Obra");
      setActiveTab("");
      setLoading("Abrindo obra");
      state.titleId = titleId;
      const title = await api(`/api/title/${encodeURIComponent(titleId)}?user_id=${encodeURIComponent(userId)}`, { timeout: 26000 });
      state.currentTitle = title;
      renderTitle(title);
    }

    function renderTitle(title) {
      const chapters  = sortChapters(title.chapters || []);
      const latest    = latestChapter(title);
      const first     = firstChapter(title);
      const lastRead  = title.last_read;
      const favs      = storage.get(localFavoritesKey, {});
      const isFav     = Boolean(favs[title.title_id]);
      const cover     = coverOf(title);
      const titleText = title.title || title.display_title || "Novel";

      view.innerHTML = `
        <div class="detail">
          <div class="detail-hero">
            <div class="detail-hero-blur" style="background-image:url('${escapeHtml(cover)}')"></div>
            <div class="detail-hero-overlay"></div>
            ${cover
              ? `<img class="poster" src="${escapeHtml(cover)}" alt="">`
              : `<div class="poster-fallback">${escapeHtml(titleText)}</div>`}
            <div class="detail-info">
              <h1 class="detail-title">${escapeHtml(titleText)}</h1>
              <div class="detail-chips">
                ${title.status ? `<span class="chip chip-default">${escapeHtml(title.status)}</span>` : ""}
                ${title.type   ? `<span class="chip chip-purple">${escapeHtml(title.type)}</span>` : ""}
                <span class="chip chip-gold">${escapeHtml(title.total_chapters || chapters.length || "?")} caps</span>
              </div>
              <div class="actions">
                ${lastRead && lastRead.chapter_id ? `<button class="action hot" id="continueBtn">▶ Continuar</button>` : ""}
                ${latest && latest.chapter_id ? `<button class="action blue" id="latestBtn">↓ Último</button>` : ""}
                ${first  && first.chapter_id  ? `<button class="action" id="firstBtn">⟩ Começar</button>` : ""}
                <button class="action good" id="favBtn">${isFav ? "★ Salvo" : "☆ Favoritar"}</button>
              </div>
            </div>
          </div>

          <div class="synopsis-box">
            <div class="synopsis-label">Sinopse</div>
            <p class="synopsis collapsed" id="synopsis">${escapeHtml(title.description || "Sem sinopse disponível.")}</p>
            <button class="text-btn" id="synopsisBtn">Mostrar completa ↓</button>
          </div>

          <div class="chapters-panel">
            <div class="chapters-header">
              <span class="chapters-title-row">Capítulos</span>
              <span class="section-count" id="chapterCount">${chapters.length}</span>
            </div>
            <div class="chapter-tools">
              <input id="chapterFilter" placeholder="Filtrar capítulo…">
              <button class="action" id="retryTitleBtn" title="Atualizar">↻</button>
            </div>
            <div class="chapter-list" id="chapterList"></div>
          </div>
        </div>`;

      document.getElementById("continueBtn")?.addEventListener("click", () => openReader(lastRead.chapter_id, title.title_id).catch(showError));
      document.getElementById("latestBtn")?.addEventListener("click",   () => openReader(latest.chapter_id,   title.title_id).catch(showError));
      document.getElementById("firstBtn")?.addEventListener("click",    () => openReader(first.chapter_id,    title.title_id).catch(showError));
      document.getElementById("favBtn")?.addEventListener("click",      () => toggleFavorite(title).catch(showError));
      document.getElementById("retryTitleBtn")?.addEventListener("click", async () => {
        await api("/api/refresh", { method: "POST" }).catch(() => null);
        await openTitle(title.title_id);
      });
      document.getElementById("synopsisBtn")?.addEventListener("click", () => {
        const el = document.getElementById("synopsis");
        const collapsed = el.classList.toggle("collapsed");
        document.getElementById("synopsisBtn").textContent = collapsed ? "Mostrar completa ↓" : "Recolher ↑";
      });
      const filter = document.getElementById("chapterFilter");
      filter.addEventListener("input", () => renderChapterList(chapters, filter.value, title.title_id));
      renderChapterList(chapters, "", title.title_id);
    }

    function renderChapterList(chapters, query, titleId) {
      const list = document.getElementById("chapterList");
      if (!list) return;
      const q = String(query || "").trim().toLowerCase();
      const filtered = chapters.filter(ch => {
        const text = `${ch.chapter_number || ""} ${ch.chapter_title || ""}`.toLowerCase();
        return !q || text.includes(q);
      });
      document.getElementById("chapterCount").textContent = filtered.length;
      if (!filtered.length) {
        list.innerHTML = emptyHtml("Nenhum capítulo encontrado.", "Tente outro filtro ou atualize.");
        return;
      }
      list.innerHTML = filtered.map((ch, i) => `
        <button class="chapter-row" data-chapter="${escapeHtml(ch.chapter_id)}" style="animation-delay:${Math.min(i*14,200)}ms">
          <div class="chapter-num">${escapeHtml(String(ch.chapter_number || "?").replace(/\..*/,""))}</div>
          <div class="chapter-info">
            <strong>Capítulo ${escapeHtml(ch.chapter_number || "?")}</strong>
            <span>${escapeHtml(ch.chapter_title || "Ler agora")}</span>
          </div>
          <div class="chapter-arrow">›</div>
        </button>
      `).join("");
      list.querySelectorAll("[data-chapter]").forEach(btn => {
        btn.addEventListener("click", () => openReader(btn.dataset.chapter, titleId).catch(showError));
      });
    }

    async function toggleFavorite(title) {
      const favs   = storage.get(localFavoritesKey, {});
      const exists = Boolean(favs[title.title_id]);
      if (exists) {
        delete favs[title.title_id];
      } else {
        favs[title.title_id] = {
          title_id: title.title_id,
          title: title.title,
          display_title: title.display_title || title.title,
          cover_url: title.cover_url,
          background_url: title.background_url || title.banner_url,
          latest_chapter: latestChapter(title),
          status: title.status,
          added_at: Date.now(),
          updated_at: Date.now()
        };
      }
      storage.set(localFavoritesKey, favs);
      renderTitle(title);
      if (userId !== "guest") {
        await api("/api/favorites", {
          method: "POST",
          body: JSON.stringify({ ...(favs[title.title_id] || {}), user_id: userId, title_id: title.title_id, favorite: !exists })
        }).catch(() => null);
      }
    }

    function cleanParagraphs(paragraphs) {
      const clean = (paragraphs || []).map(p => String(p || "").trim()).filter(Boolean);
      return clean.length ? clean : ["Nao consegui carregar o texto deste capitulo agora. Tente atualizar ou abrir outro capitulo."];
    }

    async function openReader(chapterId, titleId = "") {
      if (!chapterId) return;
      setRoute("reader", "Leitor");
      setActiveTab("");
      setLoading("Abrindo capítulo");
      state.chapterId = chapterId;
      state.titleId = titleId || state.titleId;
      const chapter = await api(`/api/chapter/${encodeURIComponent(chapterId)}`, { timeout: 26000 });
      state.currentChapter = chapter;
      state.titleId = chapter.title_id || state.titleId;
      state.currentParagraphs = cleanParagraphs(chapter.paragraphs || []);

      const localProgress  = storage.get(localProgressKey, {});
      const remoteProgress = userId !== "guest" && state.titleId
        ? await api(`/api/progress?user_id=${encodeURIComponent(userId)}&title_id=${encodeURIComponent(state.titleId)}`).catch(() => ({}))
        : {};
      const stored = localProgress[state.titleId] || remoteProgress || {};
      state.scrollPercent = stored && stored.chapter_id === chapter.chapter_id
        ? Math.min(100, Math.max(0, Number(stored.scroll_percent || 0)))
        : 0;
      renderReader();
    }

    function renderReader() {
      const chapter  = state.currentChapter;
      const paragraphs = state.currentParagraphs || [];
      const progress = Math.round(state.scrollPercent || 0);
      document.documentElement.style.setProperty("--reader-font", `${state.readerFont}px`);
      view.innerHTML = `
        <div class="reader">
          <div class="reader-head">
            <div class="reader-eyebrow">Lendo agora</div>
            <div class="reader-title">${escapeHtml(chapter.title || "Novel")}</div>
            <div class="reader-meta">
              <span>Cap. ${escapeHtml(chapter.chapter_number || "?")}</span>
              <span>${paragraphs.length} blocos</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="readerProgress" style="width:${progress}%"></div>
            </div>
            <div class="reader-tools">
              <button class="tool" id="fontDown">A−</button>
              <button class="tool" id="fontUp">A+</button>
              <button class="tool" id="themeToggle">${state.readerDark ? "☼" : "☾"}</button>
            </div>
          </div>

          <article class="reader-page continuous ${state.readerDark ? "dark" : ""}">
            ${paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join("")}
          </article>

          <div class="reader-controls">
            <button class="action" id="prevChapter" ${chapter.previous_chapter && chapter.previous_chapter.chapter_id ? "" : "disabled"}>‹ Cap. anterior</button>
            <span class="reader-pct" id="readerPct">${progress}%</span>
            <button class="action hot" id="nextChapter" ${chapter.next_chapter && chapter.next_chapter.chapter_id ? "" : "disabled"}>Prox. cap. ›</button>
          </div>
        </div>`;

      document.getElementById("prevChapter").addEventListener("click", () => {
        if (chapter.previous_chapter && chapter.previous_chapter.chapter_id) {
          openReader(chapter.previous_chapter.chapter_id, chapter.title_id).catch(showError);
        }
      });
      document.getElementById("nextChapter").addEventListener("click", () => {
        if (chapter.next_chapter && chapter.next_chapter.chapter_id) {
          openReader(chapter.next_chapter.chapter_id, chapter.title_id).catch(showError);
        }
      });
      document.getElementById("fontDown").addEventListener("click", () => {
        state.readerFont = Math.max(15, state.readerFont - 1);
        localStorage.setItem("novel_reader_font", String(state.readerFont));
        renderReader();
      });
      document.getElementById("fontUp").addEventListener("click", () => {
        state.readerFont = Math.min(26, state.readerFont + 1);
        localStorage.setItem("novel_reader_font", String(state.readerFont));
        renderReader();
      });
      document.getElementById("themeToggle").addEventListener("click", () => {
        state.readerDark = !state.readerDark;
        localStorage.setItem("novel_reader_dark", state.readerDark ? "1" : "0");
        renderReader();
      });
      requestAnimationFrame(() => {
        const maxScroll = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
        window.scrollTo({ top: maxScroll * ((state.scrollPercent || 0) / 100), behavior: "auto" });
        updateReaderProgress();
      });
      window.removeEventListener("scroll", onReaderScroll);
      window.addEventListener("scroll", onReaderScroll, { passive: true });
      saveProgress();
    }

    function updateReaderProgress() {
      if (state.route !== "reader") return;
      const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      state.scrollPercent = Math.min(100, Math.max(0, (window.scrollY / maxScroll) * 100));
      const pct = Math.round(state.scrollPercent);
      const fill = document.getElementById("readerProgress");
      const label = document.getElementById("readerPct");
      if (fill) fill.style.width = `${pct}%`;
      if (label) label.textContent = `${pct}%`;
    }

    function onReaderScroll() {
      updateReaderProgress();
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(() => saveProgress(), 450);
    }

    async function saveProgress() {
      const chapter = state.currentChapter;
      if (!chapter || !state.titleId) return;
      const payload = {
        user_id: userId,
        title_id: state.titleId,
        title_name: chapter.title || "",
        chapter_id: chapter.chapter_id,
        chapter_number: chapter.chapter_number || "",
        chapter_url: chapter.chapter_url || "",
        page_index: 1,
        total_pages: 1,
        scroll_percent: Number((state.scrollPercent || 0).toFixed(2)),
        paragraph_count: state.currentParagraphs.length,
        cover_url: chapter.cover_url || (state.currentTitle && state.currentTitle.cover_url) || "",
        updated_at: Date.now()
      };
      const localProgress = storage.get(localProgressKey, {});
      localProgress[state.titleId] = payload;
      storage.set(localProgressKey, localProgress);
      if (userId !== "guest") {
        api("/api/progress", { method: "POST", body: JSON.stringify(payload), timeout: 8000 }).catch(() => null);
      }
    }

    async function renderSearch(query) {
      setRoute("search", "Busca");
      setActiveTab("");
      setLoading("Buscando");
      const data = await api(`/api/search?q=${encodeURIComponent(query)}&limit=30`, { timeout: 22000 });
      const results = data.results || [];
      view.innerHTML = results.length
        ? `<div class="section">
            <div class="section-head">
              <h2 class="section-title">Busca: ${escapeHtml(query)}</h2>
              <span class="section-count">${results.length}</span>
            </div>
            <div class="ornament">✦</div>
            <div class="grid">${results.map(card).join("")}</div>
          </div>`
        : emptyHtml("Nada encontrado.", `Não há resultados para "${query}".`);
      bindCards();
    }

    async function renderHistory() {
      setRoute("history", "Histórico");
      setActiveTab("history");
      const localProgress = storage.get(localProgressKey, {});
      let items = Object.values(localProgress).sort((a, b) => Number(b.updated_at || 0) - Number(a.updated_at || 0));
      if (userId !== "guest") {
        const remote = await api(`/api/history?user_id=${encodeURIComponent(userId)}&limit=120`, { timeout: 12000 }).catch(() => null);
        if (remote && remote.items && remote.items.length) items = remote.items;
      }
      if (!items.length) {
        view.innerHTML = emptyHtml("Seu histórico está vazio.", "Comece a ler uma novel para ver o progresso aqui.");
        return;
      }
      view.innerHTML = `
        <div class="section">
          <div class="section-head">
            <h2 class="section-title">Histórico</h2>
            <span class="section-count">${items.length}</span>
          </div>
          <div class="ornament">✦</div>
          <div class="chapters-panel">
            <div class="chapter-list">
              ${items.map((item, i) => `
                <button class="history-row" data-history-chapter="${escapeHtml(item.chapter_id)}" data-history-title="${escapeHtml(item.title_id)}" style="animation-delay:${Math.min(i*14,200)}ms">
                  ${item.cover_url
                    ? `<img class="history-thumb" src="${escapeHtml(item.cover_url)}" alt="" loading="lazy">`
                    : `<div class="history-thumb-fallback">📖</div>`}
                  <div>
                    <strong style="display:block;font-size:14px;font-weight:600;color:var(--soft)">${escapeHtml(item.title_name || "Novel")}</strong>
                    <span style="display:block;font-size:12px;color:var(--muted);margin-top:3px">Cap. ${escapeHtml(item.chapter_number || "?")} · ${Math.round(Number(item.scroll_percent || 0))}% lido</span>
                  </div>
                  <div class="chapter-arrow">›</div>
                </button>
              `).join("")}
            </div>
          </div>
        </div>`;
      view.querySelectorAll("[data-history-chapter]").forEach(btn => {
        btn.addEventListener("click", () => openReader(btn.dataset.historyChapter, btn.dataset.historyTitle).catch(showError));
      });
    }

    async function renderFavorites() {
      setRoute("favorites", "Favoritos");
      setActiveTab("favorites");
      let favs = Object.values(storage.get(localFavoritesKey, {}));
      if (userId !== "guest") {
        const remote = await api(`/api/favorites?user_id=${encodeURIComponent(userId)}`, { timeout: 12000 }).catch(() => null);
        if (remote && remote.items) favs = remote.items;
      }
      view.innerHTML = favs.length
        ? `<div class="section">
            <div class="section-head">
              <h2 class="section-title">Favoritos</h2>
              <span class="section-count">${favs.length}</span>
            </div>
            <div class="ornament">✦</div>
            <div class="grid">${favs.map(card).join("")}</div>
          </div>`
        : emptyHtml("Nenhum favorito ainda.", "Marque novels como favoritas para vê-las aqui.");
      bindCards();
    }

    function newsCard(item, index = 0) {
      const title = item.title || "Noticia";
      const image = item.image_url || "";
      const meta = [item.published_at, item.author].filter(Boolean).join(" · ");
      return `
        <button class="news-card" data-news-url="${escapeHtml(item.url || "")}" style="animation-delay:${Math.min(index*30, 240)}ms">
          ${image
            ? `<img class="news-thumb" src="${escapeHtml(image)}" alt="" loading="lazy">`
            : `<div class="news-thumb-fallback">N</div>`}
          <div>
            <div class="news-title">${escapeHtml(title)}</div>
            ${meta ? `<div class="news-meta">${escapeHtml(meta)}</div>` : ""}
            ${item.excerpt ? `<div class="news-excerpt">${escapeHtml(item.excerpt)}</div>` : ""}
          </div>
        </button>`;
    }

    async function renderNews() {
      setRoute("news", "Noticias");
      setActiveTab("news");
      setLoading("Carregando noticias");
      const data = await api("/api/news?limit=20", { timeout: 22000 });
      const items = data.items || [];
      view.innerHTML = items.length
        ? `<div class="section">
            <div class="section-head">
              <h2 class="section-title">Noticias</h2>
              <span class="section-count">${items.length}</span>
            </div>
            <div class="ornament">✦</div>
            <div class="news-list">${items.map(newsCard).join("")}</div>
          </div>`
        : emptyHtml("Nenhuma noticia carregada agora.", "Tente atualizar em alguns segundos.");
      view.querySelectorAll("[data-news-url]").forEach(btn => {
        btn.addEventListener("click", () => {
          const url = btn.dataset.newsUrl;
          if (!url) return;
          if (tg && tg.openLink) tg.openLink(url);
          else window.open(url, "_blank", "noopener,noreferrer");
        });
      });
    }

    async function renderProfile() {
      setRoute("profile", "Perfil");
      setActiveTab("profile");
      const localProgress = storage.get(localProgressKey, {});
      const localFavs     = storage.get(localFavoritesKey, {});
      let stats = {
        favorites_count: Object.keys(localFavs).length,
        chapters_read: Object.values(localProgress).length,
        titles_opened: Object.keys(localProgress).length,
        pages_read: Object.values(localProgress).reduce((sum, it) => sum + Number(it.page_index || 1), 0),
        offline_access: {}
      };
      if (userId !== "guest") {
        stats = await api(`/api/profile?user_id=${encodeURIComponent(userId)}`, { timeout: 12000 }).catch(() => stats);
      }
      const access = stats.offline_access || {};
      view.innerHTML = `
        <div class="section">
          <div class="section-head">
            <h2 class="section-title">Perfil</h2>
            <span class="section-count">ID ${escapeHtml(userId)}</span>
          </div>
          <div class="ornament">✦</div>
          <div class="stats">
            <div class="stat"><span class="stat-value">${escapeHtml(stats.favorites_count || 0)}</span><span class="stat-label">Favoritos</span></div>
            <div class="stat"><span class="stat-value">${escapeHtml(stats.chapters_read  || 0)}</span><span class="stat-label">Caps lidos</span></div>
            <div class="stat"><span class="stat-value">${escapeHtml(stats.titles_opened  || 0)}</span><span class="stat-label">Obras abertas</span></div>
            <div class="stat"><span class="stat-value">${escapeHtml(stats.pages_read     || 0)}</span><span class="stat-label">Caps salvos</span></div>
          </div>
        </div>
        <div class="section">
          <div class="chapters-panel">
            <div class="chapter-list">
              <div class="chapter-row" style="cursor:default">
                <div class="chapter-num">${access.is_active ? "✓" : "!"}</div>
                <div class="chapter-info">
                  <strong>Leitura Offline</strong>
                  <span>${access.is_active ? "PDF e EPUB liberados" : "Sem plano ativo"}</span>
                </div>
                <div class="chapter-arrow" style="color:${access.is_active ? "var(--teal)" : "var(--muted)"}">●</div>
              </div>
            </div>
          </div>
        </div>`;
    }

    function setActiveTab(tab) {
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
    }

    function showError(error) {
      setRoute(state.route === "reader" ? "reader" : state.route, subtitle.textContent);
      view.innerHTML = `
        <div class="error-box">
          <span class="empty-icon">⚡</span>
          <div class="empty-text">${escapeHtml(error.message || "Não consegui carregar agora.")}</div>
          <button class="retry-btn" id="retryBtn">↻ Tentar de novo</button>
        </div>`;
      document.getElementById("retryBtn")?.addEventListener("click", () => boot(true).catch(showError));
    }

    async function syncLocal() {
      if (userId === "guest") return;
      const progress  = Object.values(storage.get(localProgressKey, {}));
      const favorites = Object.values(storage.get(localFavoritesKey, {}));
      if (progress.length) {
        await api("/api/progress/sync",  { method: "POST", body: JSON.stringify({ user_id: userId, progress }),  timeout: 9000 }).catch(() => null);
      }
      if (favorites.length) {
        await api("/api/favorites/sync", { method: "POST", body: JSON.stringify({ user_id: userId, favorites }), timeout: 9000 }).catch(() => null);
      }
    }

    searchForm.addEventListener("submit", e => {
      e.preventDefault();
      const q = searchInput.value.trim();
      if (q.length >= 2) renderSearch(q).catch(showError);
    });

    backBtn.addEventListener("click", () => {
      if (state.route === "reader" && state.titleId) return openTitle(state.titleId).catch(showError);
      if (state.route !== "home") return renderHome().catch(showError);
      if (tg) tg.close();
    });

    refreshBtn.addEventListener("click", async () => {
      await api("/api/refresh", { method: "POST" }).catch(() => null);
      boot(true).catch(showError);
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        if (tab === "home")      renderHome().catch(showError);
        if (tab === "news")      renderNews().catch(showError);
        if (tab === "history")   renderHistory().catch(showError);
        if (tab === "favorites") renderFavorites().catch(showError);
        if (tab === "profile")   renderProfile().catch(showError);
      });
    });

    async function boot(forceHome = false) {
      syncLocal().catch(() => null);
      if (!forceHome && state.route === "reader" && state.chapterId) return openReader(state.chapterId, state.titleId);
      if (!forceHome && state.route === "news") return renderNews();
      if (!forceHome && state.titleId && ["detail", "chapters"].includes(state.route)) return openTitle(state.titleId);
      return renderHome();
    }

    boot().catch(showError);
  </script>
</body>
</html>
