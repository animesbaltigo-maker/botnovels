
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Novels Baltigo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --bg2: #050505;
      --panel: rgba(255,255,255,.045);
      --panel2: rgba(255,255,255,.075);
      --panel3: rgba(255,255,255,.12);
      --line: rgba(255,255,255,.09);
      --line2: rgba(255,255,255,.17);
      --text: #fff;
      --text2: #c9c9d1;
      --text3: #8c8c96;
      --accent: #ff412e;
      --accent2: #e6251c;
      --accent3: #ff806d;
      --gold: #f5c84b;
      --green: #22d97b;
      --reader-bg: #f4efe5;
      --reader-text: #17130f;
      --grad: linear-gradient(135deg, #ff412e 0%, #e6251c 100%);
      --shadow: 0 18px 58px rgba(0,0,0,.66);
      --topbar: 58px;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --max-w: 1320px;
      --reader-font: 18px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,65,46,.12) 0, rgba(0,0,0,0) 270px),
        radial-gradient(circle at 75% -12%, rgba(255,65,46,.18), transparent 32%);
    }
    body.reader-mode::before { display: none; }
    button, input { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; }
    button:disabled { opacity: .38; cursor: default; }
    img { display: block; max-width: 100%; }

    .app { position: relative; z-index: 1; min-height: 100dvh; padding-top: calc(var(--topbar) + var(--safe-t)); }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: calc(var(--topbar) + var(--safe-t));
      padding-top: var(--safe-t);
    }
    .topbar::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(5,5,6,.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(26px) saturate(170%);
    }
    .topbar-inner {
      position: relative;
      height: var(--topbar);
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--text2);
      background: var(--panel);
      border: 1px solid var(--line);
      transition: transform .15s, background .18s, border-color .18s;
    }
    .icon-btn svg, .nav-icon svg, .inline-icon { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .icon-btn:active, .nav-item:active, .card:active, .action:active, .chapter-row:active { transform: scale(.92); }
    .brand { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--grad);
      box-shadow: 0 4px 18px rgba(255,65,46,.28);
      font-weight: 900;
    }
    .brand-copy { min-width: 0; display: none; flex-direction: column; }
    .brand-name {
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-sub { color: var(--text3); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .searchbar {
      flex: 1;
      min-width: 0;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    .searchbar:focus-within { border-color: rgba(255,65,46,.55); box-shadow: 0 0 0 3px rgba(255,65,46,.14); background: rgba(255,255,255,.065); }
    .searchbar input { flex: 1; min-width: 0; border: 0; outline: 0; background: transparent; font-size: 13px; }
    .searchbar input::placeholder { color: var(--text3); }
    .clear-btn { display: none; color: var(--text3); font-weight: 900; font-size: 16px; }
    .clear-btn.visible { display: block; }

    .content {
      width: min(100%, var(--max-w));
      margin: 0 auto;
      padding: 16px 14px calc(96px + var(--safe-b));
    }
    body.reader-mode .content { max-width: 920px; padding-bottom: calc(20px + var(--safe-b)); }
    body.reader-mode .bottom-nav { display: none; }

    .hero {
      position: relative;
      display: block;
      width: 100%;
      min-height: 330px;
      overflow: hidden;
      text-align: left;
      border-radius: 10px;
      background: #101012;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .hero-img, .cover, .poster, .history-cover { width: 100%; height: 100%; object-fit: cover; background: #151515; }
    .hero-img { position: absolute; inset: 0; }
    .hero-fallback, .cover-fallback, .poster-fallback, .history-fallback {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 16px;
      text-align: center;
      background: linear-gradient(135deg, rgba(255,65,46,.28), rgba(255,255,255,.04));
      color: var(--text2);
      font-weight: 900;
    }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 0, rgba(0,0,0,.54) 50%, rgba(0,0,0,.96) 100%); }
    .hero-body { position: absolute; left: 18px; right: 18px; bottom: 18px; }
    .eyebrow { color: var(--accent3); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .14em; }
    .hero-title { max-width: 860px; margin-top: 7px; font-size: clamp(32px, 10vw, 66px); line-height: .96; letter-spacing: 0; font-weight: 900; }
    .hero-meta, .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
    .chip {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--text2);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 12px;
      font-weight: 800;
    }
    .chip.hot { color: #fff; background: rgba(255,65,46,.18); border-color: rgba(255,65,46,.34); }
    .chip.gold { color: var(--gold); background: rgba(245,200,75,.1); border-color: rgba(245,200,75,.28); }

    .section { margin: 0 0 26px; animation: rise .25s ease both; }
    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .section-title { font-size: 18px; font-weight: 900; }
    .section-count { color: var(--text3); font-size: 12px; font-weight: 800; }
    .rail { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(150px, 42%); gap: 12px; overflow-x: auto; padding: 2px 2px 12px; scroll-snap-type: x mandatory; scrollbar-width: none; }
    .rail::-webkit-scrollbar { display: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(146px, 1fr)); gap: 13px; }
    .card {
      scroll-snap-align: start;
      min-width: 0;
      overflow: hidden;
      text-align: left;
      border-radius: 8px;
      background: rgba(255,255,255,.045);
      border: 1px solid var(--line);
      box-shadow: 0 8px 28px rgba(0,0,0,.36);
      transition: transform .17s, border-color .17s, background .17s;
      animation: rise .22s ease both;
    }
    .card:hover { border-color: rgba(255,65,46,.38); background: rgba(255,255,255,.065); }
    .cover-wrap { position: relative; aspect-ratio: 2 / 3; overflow: hidden; background: #111; }
    .badge {
      position: absolute;
      left: 8px;
      bottom: 8px;
      max-width: calc(100% - 16px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      padding: 5px 8px;
      background: rgba(0,0,0,.68);
      border: 1px solid rgba(255,255,255,.15);
      font-size: 11px;
      font-weight: 900;
    }
    .card-body { padding: 10px 10px 12px; }
    .card-title { min-height: 39px; font-size: 14px; font-weight: 850; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { margin-top: 5px; color: var(--text3); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .detail { animation: rise .24s ease both; }
    .detail-hero {
      position: relative;
      min-height: 250px;
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 14px;
      overflow: hidden;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.045);
      box-shadow: var(--shadow);
    }
    .detail-bg { position: absolute; inset: -30px; background-size: cover; background-position: center; opacity: .26; filter: blur(24px) saturate(1.15); }
    .detail-shade { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,0,0,.50), rgba(0,0,0,.94)); }
    .poster, .poster-fallback { position: relative; z-index: 1; width: 112px; aspect-ratio: 2 / 3; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,.14); box-shadow: 0 16px 36px rgba(0,0,0,.42); }
    .detail-info { position: relative; z-index: 1; min-width: 0; align-self: center; }
    .detail-title { font-size: clamp(24px, 8vw, 46px); line-height: 1.03; font-weight: 900; overflow-wrap: anywhere; }
    .actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 14px; }
    .action {
      min-height: 43px;
      border-radius: 8px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--panel2);
      border: 1px solid var(--line);
      color: var(--text2);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      transition: transform .15s, background .18s, border-color .18s;
    }
    .action.primary { color: #fff; background: var(--grad); border-color: rgba(255,65,46,.38); box-shadow: 0 8px 26px rgba(255,65,46,.2); }
    .action.good { color: var(--green); background: rgba(34,217,123,.08); border-color: rgba(34,217,123,.24); }
    .action.gold { color: var(--gold); background: rgba(245,200,75,.08); border-color: rgba(245,200,75,.25); }
    .panel {
      margin-top: 14px;
      border-radius: 10px;
      background: rgba(255,255,255,.045);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 10px 34px rgba(0,0,0,.28);
    }
    .panel-pad { padding: 16px; }
    .synopsis { margin-top: 8px; color: var(--text2); font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
    .synopsis.collapsed { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
    .text-btn { margin-top: 10px; color: var(--accent3); font-weight: 900; }
    .panel-head { min-height: 54px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 14px; border-bottom: 1px solid var(--line); }
    .chapter-tools { display: grid; grid-template-columns: 1fr 44px; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
    .chapter-tools input { min-width: 0; height: 44px; border-radius: 8px; border: 1px solid var(--line); outline: 0; padding: 0 12px; background: rgba(255,255,255,.05); }
    .chapter-row, .history-row {
      width: 100%;
      min-height: 68px;
      display: grid;
      grid-template-columns: 50px 1fr 24px;
      align-items: center;
      gap: 11px;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.065);
      background: transparent;
      animation: rowIn .16s ease both;
    }
    .chapter-row:last-child, .history-row:last-child { border-bottom: 0; }
    .chapter-num {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--accent3);
      background: rgba(255,65,46,.10);
      border: 1px solid rgba(255,65,46,.24);
      font-weight: 900;
      font-size: 13px;
      overflow: hidden;
    }
    .chapter-info { min-width: 0; }
    .chapter-info strong { display: block; font-size: 14px; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chapter-info span { display: block; margin-top: 4px; color: var(--text3); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .arrow { color: var(--text3); font-size: 24px; text-align: right; }
    .load-more { width: calc(100% - 28px); margin: 12px 14px 14px; }

    .reader-shell { animation: rise .22s ease both; }
    .reader-head {
      position: sticky;
      top: calc(var(--topbar) + var(--safe-t) + 8px);
      z-index: 20;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(5,5,6,.94);
      border: 1px solid var(--line);
      box-shadow: 0 12px 36px rgba(0,0,0,.45);
      backdrop-filter: blur(24px);
    }
    .reader-title { margin-top: 4px; font-size: 17px; font-weight: 900; line-height: 1.25; }
    .reader-meta { display: flex; justify-content: space-between; gap: 10px; margin-top: 7px; color: var(--text3); font-size: 12px; font-weight: 800; }
    .progress { height: 6px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.09); margin-top: 11px; }
    .progress-fill { height: 100%; border-radius: inherit; background: var(--grad); transition: width .16s; }
    .reader-tools { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .reader-mini { height: 36px; min-width: 42px; border-radius: 8px; padding: 0 11px; color: var(--text2); background: var(--panel2); border: 1px solid var(--line); font-weight: 900; }
    .reader-page {
      min-height: calc(100dvh - 270px);
      padding: clamp(24px, 6vw, 54px);
      border-radius: 10px;
      color: var(--reader-text);
      background: var(--reader-bg);
      box-shadow: var(--shadow);
    }
    .reader-page.dark { color: #eee9ff; background: #09090b; border: 1px solid var(--line); }
    .reader-page p { margin: 0 0 1.12em; font: 400 var(--reader-font) / 1.88 Lora, Georgia, serif; overflow-wrap: anywhere; }
    .reader-controls {
      position: sticky;
      bottom: calc(10px + var(--safe-b));
      z-index: 24;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px;
      border-radius: 10px;
      background: rgba(5,5,6,.94);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
    }
    .reader-pct { min-width: 48px; color: var(--accent3); text-align: center; font-weight: 900; }

    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .stat { border-radius: 8px; border: 1px solid var(--line); background: var(--panel); padding: 15px; }
    .stat-value { color: var(--accent3); font-size: 30px; line-height: 1; font-weight: 900; }
    .stat-label { display: block; margin-top: 6px; color: var(--text3); font-size: 12px; font-weight: 900; text-transform: uppercase; }
    .history-row { grid-template-columns: 48px 1fr 24px; }
    .history-cover, .history-fallback { width: 48px; height: 66px; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: calc(12px + var(--safe-b));
      transform: translateX(-50%);
      z-index: 60;
      width: min(calc(100vw - 18px), 620px);
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(5,5,6,.96);
      border: 1px solid rgba(255,255,255,.11);
      box-shadow: 0 10px 34px rgba(0,0,0,.62);
      backdrop-filter: blur(28px) saturate(180%);
    }
    .nav-item { flex: 1; height: 54px; border-radius: 999px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: rgba(255,255,255,.38); transition: background .18s, color .18s; }
    .nav-item.active { color: #fff; background: rgba(255,255,255,.10); }
    .nav-label { font-size: 10px; font-weight: 700; white-space: nowrap; }

    .empty, .loading, .error {
      min-height: 310px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 28px 18px;
      border-radius: 10px;
      background: rgba(255,255,255,.045);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .empty-inner { max-width: 420px; }
    .empty-icon { display: inline-grid; place-items: center; width: 48px; height: 48px; border-radius: 14px; background: rgba(255,65,46,.12); color: var(--accent3); margin-bottom: 12px; }
    .empty-title { font-size: 18px; font-weight: 900; }
    .empty-sub { color: var(--text3); font-size: 13px; line-height: 1.55; margin-top: 7px; }
    .spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(255,255,255,.12); border-top-color: var(--accent); animation: spin .8s linear infinite; margin: 0 auto 13px; }
    .skeleton-rail { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(150px, 42%); gap: 12px; overflow: hidden; }
    .skeleton { position: relative; overflow: hidden; border-radius: 8px; background: rgba(255,255,255,.06); }
    .skeleton::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent); animation: shimmer 1.2s infinite; }

    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes rowIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 100% { transform: translateX(100%); } }

    @media (min-width: 700px) {
      .brand-copy { display: flex; }
      .content { padding-inline: 18px; }
      .rail, .skeleton-rail { grid-auto-columns: minmax(168px, 18%); }
      .detail-hero { grid-template-columns: 154px 1fr; padding: 18px; }
      .poster, .poster-fallback { width: 154px; }
      .actions { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .hero { min-height: 410px; }
    }
    @media (max-width: 390px) {
      .content { padding-inline: 10px; }
      .rail, .skeleton-rail { grid-auto-columns: minmax(136px, 46%); }
      .grid { grid-template-columns: repeat(auto-fill, minmax(134px, 1fr)); }
      .detail-hero { grid-template-columns: 94px 1fr; }
      .poster, .poster-fallback { width: 94px; }
      .actions { grid-template-columns: 1fr; }
      .chapter-row { grid-template-columns: 44px 1fr 18px; padding-inline: 10px; }
      .chapter-num { width: 42px; height: 42px; }
      .reader-controls { grid-template-columns: 1fr; }
      .reader-pct { order: -1; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <button class="icon-btn" id="backBtn" aria-label="Voltar" title="Voltar">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="brand" id="brandBtn" aria-label="Inicio">
          <span class="brand-mark">N</span>
          <span class="brand-copy"><span class="brand-name">BALTIGO Novels</span><span class="brand-sub" id="subtitle">Inicio</span></span>
        </button>
        <form class="searchbar" id="searchForm">
          <svg class="inline-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
          <input id="searchInput" autocomplete="off" placeholder="Buscar novel, genero ou autor" aria-label="Buscar novel">
          <button class="clear-btn" id="clearSearch" type="button" aria-label="Limpar busca">x</button>
        </form>
        <button class="icon-btn" id="refreshBtn" aria-label="Atualizar" title="Atualizar">
          <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18.5 2v4h-4"/><path d="M5.5 22v-4h4"/></svg>
        </button>
      </div>
    </header>

    <main class="content" id="view" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Navegacao principal">
      <button class="nav-item active" data-tab="home">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></span>
        <span class="nav-label">Inicio</span>
      </button>
      <button class="nav-item" data-tab="history">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 2"/></svg></span>
        <span class="nav-label">Historico</span>
      </button>
      <button class="nav-item" data-tab="favorites">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 17.5L5.8 21l1.6-7L2 9.3l7.1-.6L12 2l2.9 6.7 7.1.6-5.4 4.7 1.6 7z"/></svg></span>
        <span class="nav-label">Favoritos</span>
      </button>
      <button class="nav-item" data-tab="profile">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>
        <span class="nav-label">Perfil</span>
      </button>
    </nav>
  </div>

  <script>
    (() => {
      "use strict";

      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
      const qs = new URLSearchParams(location.search);
      const apiBase = location.origin;
      const view = document.getElementById("view");
      const subtitle = document.getElementById("subtitle");
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("searchInput");
      const clearSearch = document.getElementById("clearSearch");
      const backBtn = document.getElementById("backBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const brandBtn = document.getElementById("brandBtn");
      const user = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : {};
      const userId = clean(qs.get("user_id") || user.id || "guest") || "guest";
      const MAX_CHAPTERS_BATCH = 140;
      const cache = new Map();

      const state = {
        route: normalizeRoute(qs.get("route"), qs),
        titleId: safeId(qs.get("title_id") || qs.get("novel_id") || qs.get("id")),
        chapterId: safeId(qs.get("chapter_id") || qs.get("read") || qs.get("cap")),
        currentTitle: null,
        currentChapter: null,
        paragraphs: [],
        chapterQuery: "",
        chapterVisible: MAX_CHAPTERS_BATCH,
        readerPercent: 0,
        readerFont: clamp(Number(localStorage.getItem("novel_reader_font") || 18), 15, 28),
        readerDark: localStorage.getItem("novel_reader_dark") === "1",
        saveTimer: 0,
        lastAction: () => renderHome()
      };

      const progressKey = `novel_progress:${userId}`;
      const favoritesKey = `novel_favorites:${userId}`;

      const storage = {
        get(key, fallback) {
          try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : fallback;
          } catch (_) {
            return fallback;
          }
        },
        set(key, value) {
          try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {}
        }
      };

      initTelegram();
      boot().catch(showError);

      function initTelegram() {
        if (!tg) return;
        try {
          tg.ready();
          tg.expand();
          tg.setHeaderColor("#000000");
          tg.setBackgroundColor("#000000");
          tg.BackButton.onClick(handleBack);
          updateBack();
        } catch (_) {}
      }

      function icon(name) {
        const icons = {
          book: '<svg class="inline-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></svg>',
          play: '<svg class="inline-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>',
          star: '<svg class="inline-icon" viewBox="0 0 24 24"><path d="M12 17.5L5.8 21l1.6-7L2 9.3l7.1-.6L12 2l2.9 6.7 7.1.6-5.4 4.7 1.6 7z"/></svg>',
          list: '<svg class="inline-icon" viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>',
          refresh: '<svg class="inline-icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18.5 2v4h-4"/></svg>'
        };
        return icons[name] || "";
      }

      function clean(value) { return String(value == null ? "" : value).trim(); }
      function safeId(value) { return clean(value).replace(/[\u0000-\u001f]/g, "").slice(0, 240); }
      function escapeHtml(value) { return clean(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch])); }
      function clamp(value, min, max) { return Math.max(min, Math.min(max, Number.isFinite(value) ? value : min)); }
      function debounce(fn, wait) { let timer = 0; return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), wait); }; }
      function haptic(type = "light") { try { tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred(type); } catch (_) {} }

      function normalizeRoute(route, params) {
        const value = clean(route).toLowerCase();
        if (params.get("chapter_id") || params.get("read") || params.get("cap")) return "reader";
        if (params.get("title_id") || params.get("novel_id") || params.get("id")) return "detail";
        return ["home", "search", "history", "favorites", "profile"].includes(value) ? value : "home";
      }

      async function api(path, options = {}) {
        const ttl = Number(options.ttl || 0);
        const key = `${options.method || "GET"}:${path}:${options.body || ""}`;
        if (ttl && cache.has(key)) {
          const item = cache.get(key);
          if (Date.now() < item.expires) return item.value;
          cache.delete(key);
        }
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), options.timeout || 24000);
        try {
          const response = await fetch(apiBase + path, {
            method: options.method || "GET",
            headers: { "Content-Type": "application/json" },
            body: options.body,
            signal: controller.signal
          });
          const text = await response.text();
          let data = {};
          try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { detail: text }; }
          if (!response.ok) throw new Error(data.detail || `Falha HTTP ${response.status}`);
          if (ttl) cache.set(key, { value: data, expires: Date.now() + ttl });
          return data;
        } finally {
          clearTimeout(timer);
        }
      }

      function setRoute(route, label) {
        state.route = route;
        subtitle.textContent = label || "Novels";
        document.body.classList.toggle("reader-mode", route === "reader");
        updateBack();
      }

      function updateBack() {
        try {
          if (tg && tg.BackButton) {
            if (state.route === "home") tg.BackButton.hide();
            else tg.BackButton.show();
          }
        } catch (_) {}
      }

      function setActive(tab) {
        document.querySelectorAll(".nav-item").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
      }

      function scrollTop() { requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: "auto" })); }

      function titleOf(item) { return item.display_title || item.title || item.title_name || "Novel"; }
      function coverOf(item) { return item.cover_url || item.background_url || item.banner_url || ""; }
      function chapterNumberText(value) { return clean(value).replace(/^cap(?:itulo)?\.?\s*/i, ""); }
      function sortChapters(chapters) {
        return [...(chapters || [])].sort((a, b) => String(b.chapter_number || "").localeCompare(String(a.chapter_number || ""), "pt-BR", { numeric: true }));
      }
      function latestChapter(title) {
        const latest = title.latest_chapter;
        if (latest && typeof latest === "object" && latest.chapter_id) return latest;
        if (title.latest_chapter_id) return { chapter_id: title.latest_chapter_id, chapter_number: chapterNumberText(title.latest_chapter) };
        return sortChapters(title.chapters || [])[0] || null;
      }
      function firstChapter(title) {
        const first = title.first_chapter;
        if (first && first.chapter_id) return first;
        const sorted = sortChapters(title.chapters || []);
        return sorted[sorted.length - 1] || latestChapter(title);
      }

      function imageHtml(url, alt, cls) {
        if (!url) return `<div class="${cls}-fallback">${escapeHtml(alt || "Novel")}</div>`;
        return `<img class="${cls}" src="${escapeHtml(url)}" alt="${escapeHtml(alt || "Novel")}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'${cls}-fallback',textContent:'${escapeHtml(alt || "Novel").replace(/'/g, "&#39;")}'}))">`;
      }

      function loading(label = "Carregando") {
        view.innerHTML = `<div class="loading"><div class="empty-inner"><div class="spinner"></div><div class="empty-title">${escapeHtml(label)}</div><div class="empty-sub">Preparando uma leitura melhor para voce.</div></div></div>`;
      }

      function emptyHtml(title, subtitleText) {
        return `<div class="empty"><div class="empty-inner"><span class="empty-icon">${icon("book")}</span><div class="empty-title">${escapeHtml(title)}</div><div class="empty-sub">${escapeHtml(subtitleText || "")}</div></div></div>`;
      }

      function cardHtml(item, index = 0) {
        const title = titleOf(item);
        const cover = coverOf(item);
        const latest = latestChapter(item);
        const count = item.total_chapters || item.chapters_count || "";
        return `<button class="card" data-title="${escapeHtml(item.title_id || "")}" style="animation-delay:${Math.min(index * 12, 160)}ms">
          <div class="cover-wrap">${imageHtml(cover, title, "cover")}${latest ? `<span class="badge">Cap. ${escapeHtml(latest.chapter_number || item.latest_chapter || "?")}</span>` : ""}</div>
          <div class="card-body"><div class="card-title">${escapeHtml(title)}</div><div class="card-meta">${escapeHtml(count ? `${count} capitulos` : item.status || "Novel")}</div></div>
        </button>`;
      }

      function bindCards() {
        view.querySelectorAll("[data-title]").forEach(card => {
          card.addEventListener("click", () => {
            haptic("light");
            openTitle(card.dataset.title).catch(showError);
          });
        });
      }

      function sectionHtml(title, items, mode = "rail") {
        const safe = (items || []).filter(item => item && item.title_id);
        if (!safe.length) return "";
        return `<section class="section"><div class="section-head"><h2 class="section-title">${escapeHtml(title)}</h2><span class="section-count">${safe.length}</span></div><div class="${mode}">${safe.map(cardHtml).join("")}</div></section>`;
      }

      async function renderHome() {
        state.lastAction = () => renderHome();
        setRoute("home", "Inicio");
        setActive("home");
        loading("Carregando catalogo");
        const data = await api("/api/home?limit=36", { ttl: 45000, timeout: 26000 });
        const featured = data.featured || data.popular || data.catalog || [];
        const recent = data.recent_titles || data.latest_titles || [];
        const catalog = data.catalog || featured;
        const hero = featured[0] || recent[0] || catalog[0];
        let html = "";
        if (hero) {
          const cover = coverOf(hero);
          const latest = latestChapter(hero);
          html += `<button class="hero" id="heroOpen">
            ${cover ? `<img class="hero-img" src="${escapeHtml(cover)}" alt="${escapeHtml(titleOf(hero))}">` : `<div class="hero-fallback">${escapeHtml(titleOf(hero))}</div>`}
            <div class="hero-overlay"></div>
            <div class="hero-body">
              <div class="eyebrow">Destaque Baltigo</div>
              <h1 class="hero-title">${escapeHtml(titleOf(hero))}</h1>
              <div class="hero-meta"><span class="chip hot">Novel</span>${latest ? `<span class="chip gold">Cap. ${escapeHtml(latest.chapter_number || hero.latest_chapter || "?")}</span>` : ""}${hero.status ? `<span class="chip">${escapeHtml(hero.status)}</span>` : ""}</div>
            </div>
          </button>`;
        }
        html += sectionHtml("Atualizadas agora", recent, "rail");
        html += sectionHtml("Populares", featured.slice(1), "rail");
        html += sectionHtml("Catalogo", catalog, "grid");
        view.innerHTML = html || emptyHtml("Catalogo vazio", "Atualize em alguns instantes.");
        document.getElementById("heroOpen")?.addEventListener("click", () => openTitle(hero.title_id).catch(showError));
        bindCards();
        scrollTop();
      }

      async function renderSearch(query) {
        const q = clean(query);
        if (q.length < 2) return;
        state.lastAction = () => renderSearch(q);
        setRoute("search", "Busca");
        setActive("");
        loading("Buscando novels");
        const data = await api(`/api/search?q=${encodeURIComponent(q)}&limit=30`, { ttl: 30000, timeout: 24000 });
        const results = data.results || [];
        view.innerHTML = results.length ? sectionHtml(`Resultados para "${q}"`, results, "grid") : emptyHtml("Nada encontrado", `Nao encontrei resultados para "${q}".`);
        bindCards();
        scrollTop();
      }

      async function openTitle(titleId) {
        const id = safeId(titleId);
        if (!id) throw new Error("Obra sem identificador.");
        state.lastAction = () => openTitle(id);
        state.titleId = id;
        state.chapterQuery = "";
        state.chapterVisible = MAX_CHAPTERS_BATCH;
        setRoute("detail", "Obra");
        setActive("");
        loading("Abrindo obra");
        const title = await api(`/api/title/${encodeURIComponent(id)}?user_id=${encodeURIComponent(userId)}`, { ttl: 90000, timeout: 28000 });
        state.currentTitle = title;
        renderTitle(title);
        scrollTop();
      }

      function renderTitle(title) {
        const chapters = sortChapters(title.chapters || []);
        const latest = latestChapter(title);
        const first = firstChapter(title);
        const lastRead = title.last_read && title.last_read.chapter_id ? title.last_read : null;
        const favs = storage.get(favoritesKey, {});
        const isFav = Boolean(favs[title.title_id]);
        const cover = coverOf(title);
        const name = titleOf(title);
        view.innerHTML = `<div class="detail">
          <section class="detail-hero">
            <div class="detail-bg" style="background-image:url('${escapeHtml(cover)}')"></div><div class="detail-shade"></div>
            ${imageHtml(cover, name, "poster")}
            <div class="detail-info">
              <h1 class="detail-title">${escapeHtml(name)}</h1>
              <div class="chips">${title.status ? `<span class="chip">${escapeHtml(title.status)}</span>` : ""}<span class="chip hot">${escapeHtml(title.type || "Novel")}</span><span class="chip gold">${escapeHtml(title.total_chapters || chapters.length || 0)} capitulos</span></div>
              <div class="actions">
                ${lastRead ? `<button class="action primary" id="continueBtn">${icon("play")}Continuar</button>` : ""}
                ${first && first.chapter_id ? `<button class="action" id="firstBtn">${icon("book")}Comecar</button>` : ""}
                ${latest && latest.chapter_id ? `<button class="action gold" id="latestBtn">${icon("play")}Ultimo cap.</button>` : ""}
                <button class="action good" id="favBtn">${icon("star")}${isFav ? "Salvo" : "Favoritar"}</button>
              </div>
            </div>
          </section>
          <section class="panel panel-pad">
            <div class="eyebrow">Sinopse</div>
            <p class="synopsis collapsed" id="synopsis">${escapeHtml(title.description || "Sem sinopse disponivel para esta obra.")}</p>
            <button class="text-btn" id="synopsisBtn">Mostrar completa</button>
          </section>
          <section class="panel">
            <div class="panel-head"><strong>Capitulos</strong><span class="section-count" id="chapterCount">${chapters.length}</span></div>
            <div class="chapter-tools"><input id="chapterFilter" placeholder="Filtrar numero ou titulo" aria-label="Filtrar capitulos"><button class="action" id="retryTitleBtn" title="Atualizar capitulos">${icon("refresh")}</button></div>
            <div id="chapterList"></div>
          </section>
        </div>`;

        document.getElementById("continueBtn")?.addEventListener("click", () => openReader(lastRead.chapter_id, title.title_id).catch(showError));
        document.getElementById("firstBtn")?.addEventListener("click", () => openReader(first.chapter_id, title.title_id).catch(showError));
        document.getElementById("latestBtn")?.addEventListener("click", () => openReader(latest.chapter_id, title.title_id).catch(showError));
        document.getElementById("favBtn")?.addEventListener("click", () => toggleFavorite(title).catch(showError));
        document.getElementById("retryTitleBtn")?.addEventListener("click", async () => { cache.clear(); await api("/api/refresh", { method: "POST" }).catch(() => null); await openTitle(title.title_id); });
        document.getElementById("synopsisBtn")?.addEventListener("click", () => {
          const synopsis = document.getElementById("synopsis");
          const collapsed = synopsis.classList.toggle("collapsed");
          document.getElementById("synopsisBtn").textContent = collapsed ? "Mostrar completa" : "Recolher";
        });
        const filter = document.getElementById("chapterFilter");
        filter.addEventListener("input", debounce(() => {
          state.chapterQuery = filter.value;
          state.chapterVisible = MAX_CHAPTERS_BATCH;
          renderChapterList(chapters, title.title_id);
        }, 150));
        renderChapterList(chapters, title.title_id);
      }

      function renderChapterList(chapters, titleId) {
        const list = document.getElementById("chapterList");
        const count = document.getElementById("chapterCount");
        if (!list) return;
        const q = clean(state.chapterQuery).toLowerCase();
        const filtered = (chapters || []).filter(ch => {
          const text = `${ch.chapter_number || ""} ${ch.chapter_title || ""} ${ch.chapter_id || ""}`.toLowerCase();
          return ch.chapter_id && (!q || text.includes(q));
        });
        if (count) count.textContent = String(filtered.length);
        if (!filtered.length) {
          list.innerHTML = emptyHtml("Nenhum capitulo", q ? "Tente limpar o filtro." : "A fonte nao retornou capitulos para esta obra.");
          return;
        }
        const visible = filtered.slice(0, state.chapterVisible);
        list.innerHTML = visible.map((ch, index) => `<button class="chapter-row" data-chapter="${escapeHtml(ch.chapter_id)}" style="animation-delay:${Math.min(index * 7, 150)}ms">
          <span class="chapter-num">${escapeHtml(String(ch.chapter_number || "?").replace(/\.0$/, "").slice(0, 5))}</span>
          <span class="chapter-info"><strong>Capitulo ${escapeHtml(ch.chapter_number || "?")}</strong><span>${escapeHtml(ch.chapter_title || "Ler capitulo")}</span></span>
          <span class="arrow">›</span>
        </button>`).join("") + (visible.length < filtered.length ? `<button class="action load-more" id="loadMore">Mostrar mais ${Math.min(MAX_CHAPTERS_BATCH, filtered.length - visible.length)}</button>` : "");
        list.querySelectorAll("[data-chapter]").forEach(btn => btn.addEventListener("click", () => openReader(btn.dataset.chapter, titleId).catch(showError)));
        document.getElementById("loadMore")?.addEventListener("click", () => { state.chapterVisible += MAX_CHAPTERS_BATCH; renderChapterList(chapters, titleId); });
      }

      async function openReader(chapterId, titleId = "") {
        const id = safeId(chapterId);
        if (!id) throw new Error("Capitulo sem identificador.");
        state.lastAction = () => openReader(id, titleId || state.titleId);
        setRoute("reader", "Leitor");
        setActive("");
        loading("Abrindo capitulo");
        state.chapterId = id;
        state.titleId = safeId(titleId || state.titleId);
        const chapter = await api(`/api/chapter/${encodeURIComponent(id)}`, { ttl: 90000, timeout: 30000 });
        state.currentChapter = chapter;
        state.titleId = chapter.title_id || state.titleId;
        state.paragraphs = (chapter.paragraphs || []).map(clean).filter(Boolean);
        const local = storage.get(progressKey, {});
        const remote = userId !== "guest" && state.titleId ? await api(`/api/progress?user_id=${encodeURIComponent(userId)}&title_id=${encodeURIComponent(state.titleId)}`, { ttl: 15000, timeout: 8000 }).catch(() => ({})) : {};
        const stored = local[state.titleId] || remote || {};
        state.readerPercent = stored.chapter_id === chapter.chapter_id ? clamp(Number(stored.scroll_percent || 0), 0, 100) : 0;
        renderReader();
        requestAnimationFrame(restoreScroll);
      }

      function renderReader() {
        const chapter = state.currentChapter || {};
        const paragraphs = state.paragraphs.length ? state.paragraphs : ["Nao consegui carregar o texto deste capitulo agora. Tente atualizar em alguns instantes."];
        document.documentElement.style.setProperty("--reader-font", `${state.readerFont}px`);
        const pct = Math.round(state.readerPercent || 0);
        view.innerHTML = `<div class="reader-shell">
          <div class="reader-head">
            <div class="eyebrow">Lendo agora</div>
            <div class="reader-title">${escapeHtml(chapter.title || "Novel")}</div>
            <div class="reader-meta"><span>Cap. ${escapeHtml(chapter.chapter_number || "?")}</span><span>${escapeHtml(chapter.paragraph_count || paragraphs.length)} paragrafos</span></div>
            <div class="progress"><div class="progress-fill" id="readerFill" style="width:${pct}%"></div></div>
            <div class="reader-tools"><button class="reader-mini" id="fontDown">A-</button><button class="reader-mini" id="fontUp">A+</button><button class="reader-mini" id="themeBtn">${state.readerDark ? "Claro" : "Escuro"}</button></div>
          </div>
          <article class="reader-page ${state.readerDark ? "dark" : ""}">${paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join("")}</article>
          <div class="reader-controls">
            <button class="action" id="prevChapter" ${chapter.previous_chapter && chapter.previous_chapter.chapter_id ? "" : "disabled"}>Cap. anterior</button>
            <span class="reader-pct" id="readerPct">${pct}%</span>
            <button class="action primary" id="nextChapter" ${chapter.next_chapter && chapter.next_chapter.chapter_id ? "" : "disabled"}>Prox. cap.</button>
          </div>
        </div>`;
        document.getElementById("prevChapter")?.addEventListener("click", () => chapter.previous_chapter && openReader(chapter.previous_chapter.chapter_id, chapter.title_id).catch(showError));
        document.getElementById("nextChapter")?.addEventListener("click", () => chapter.next_chapter && openReader(chapter.next_chapter.chapter_id, chapter.title_id).catch(showError));
        document.getElementById("fontDown")?.addEventListener("click", () => setReaderFont(state.readerFont - 1));
        document.getElementById("fontUp")?.addEventListener("click", () => setReaderFont(state.readerFont + 1));
        document.getElementById("themeBtn")?.addEventListener("click", () => { state.readerDark = !state.readerDark; localStorage.setItem("novel_reader_dark", state.readerDark ? "1" : "0"); renderReader(); requestAnimationFrame(restoreScroll); });
        updateReaderProgress();
        saveProgress();
      }

      function setReaderFont(value) {
        state.readerFont = clamp(value, 15, 28);
        localStorage.setItem("novel_reader_font", String(state.readerFont));
        renderReader();
        requestAnimationFrame(restoreScroll);
      }

      function restoreScroll() {
        const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        window.scrollTo({ top: Math.round(max * (state.readerPercent || 0) / 100), behavior: "auto" });
        updateReaderProgress();
      }

      function updateReaderProgress() {
        if (state.route !== "reader") return;
        const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        const pct = clamp(Math.round(window.scrollY / max * 100), 0, 100);
        state.readerPercent = pct;
        const fill = document.getElementById("readerFill");
        const label = document.getElementById("readerPct");
        if (fill) fill.style.width = `${pct}%`;
        if (label) label.textContent = `${pct}%`;
      }

      function scheduleSave() {
        if (state.route !== "reader") return;
        updateReaderProgress();
        clearTimeout(state.saveTimer);
        state.saveTimer = setTimeout(saveProgress, 500);
      }

      async function saveProgress() {
        const chapter = state.currentChapter;
        if (!chapter || !state.titleId) return;
        const payload = {
          user_id: userId,
          title_id: state.titleId,
          title_name: chapter.title || "",
          chapter_id: chapter.chapter_id,
          chapter_number: chapter.chapter_number || "",
          chapter_url: chapter.chapter_url || "",
          page_index: 1,
          total_pages: 1,
          scroll_percent: state.readerPercent || 0,
          paragraph_count: state.paragraphs.length,
          cover_url: chapter.cover_url || state.currentTitle?.cover_url || "",
          updated_at: Date.now()
        };
        const local = storage.get(progressKey, {});
        local[state.titleId] = payload;
        storage.set(progressKey, local);
        if (userId !== "guest") api("/api/progress", { method: "POST", body: JSON.stringify(payload), timeout: 8000 }).catch(() => null);
      }

      async function toggleFavorite(title) {
        haptic("medium");
        const favs = storage.get(favoritesKey, {});
        const exists = Boolean(favs[title.title_id]);
        if (exists) delete favs[title.title_id];
        else favs[title.title_id] = { title_id: title.title_id, title: title.title, display_title: titleOf(title), cover_url: coverOf(title), background_url: title.background_url || coverOf(title), latest_chapter: latestChapter(title), status: title.status, added_at: Date.now(), updated_at: Date.now() };
        storage.set(favoritesKey, favs);
        renderTitle(title);
        if (userId !== "guest") {
          const item = favs[title.title_id] || { user_id: userId, title_id: title.title_id, favorite: false };
          api("/api/favorites", { method: "POST", body: JSON.stringify({ ...item, user_id: userId, title_id: title.title_id, favorite: !exists }), timeout: 9000 }).catch(() => null);
        }
      }

      async function renderHistory() {
        state.lastAction = () => renderHistory();
        setRoute("history", "Historico");
        setActive("history");
        loading("Carregando historico");
        const local = storage.get(progressKey, {});
        let items = Object.values(local).sort((a, b) => Number(b.updated_at || 0) - Number(a.updated_at || 0));
        if (userId !== "guest") {
          const remote = await api(`/api/history?user_id=${encodeURIComponent(userId)}&limit=140`, { ttl: 30000, timeout: 14000 }).catch(() => null);
          if (remote && Array.isArray(remote.items) && remote.items.length) items = remote.items;
        }
        if (!items.length) {
          view.innerHTML = emptyHtml("Historico vazio", "Comece uma leitura e seu progresso aparece aqui.");
          return;
        }
        view.innerHTML = `<section class="section"><div class="section-head"><h2 class="section-title">Historico</h2><span class="section-count">${items.length}</span></div><div class="panel">${items.map((it, index) => `<button class="history-row" data-history-chapter="${escapeHtml(it.chapter_id)}" data-history-title="${escapeHtml(it.title_id)}" style="animation-delay:${Math.min(index * 7, 150)}ms">${imageHtml(it.cover_url, it.title_name || "Novel", "history")}<span class="chapter-info"><strong>${escapeHtml(it.title_name || "Novel")}</strong><span>Cap. ${escapeHtml(it.chapter_number || "?")} - ${escapeHtml(Math.round(it.scroll_percent || 0))}% lido</span></span><span class="arrow">›</span></button>`).join("")}</div></section>`;
        view.querySelectorAll("[data-history-chapter]").forEach(btn => btn.addEventListener("click", () => openReader(btn.dataset.historyChapter, btn.dataset.historyTitle).catch(showError)));
      }

      async function renderFavorites() {
        state.lastAction = () => renderFavorites();
        setRoute("favorites", "Favoritos");
        setActive("favorites");
        loading("Carregando favoritos");
        let favs = Object.values(storage.get(favoritesKey, {}));
        if (userId !== "guest") {
          const remote = await api(`/api/favorites?user_id=${encodeURIComponent(userId)}`, { ttl: 30000, timeout: 14000 }).catch(() => null);
          if (remote && Array.isArray(remote.items)) favs = remote.items;
        }
        view.innerHTML = favs.length ? sectionHtml("Favoritos", favs, "grid") : emptyHtml("Nenhum favorito", "Toque em Favoritar na pagina de uma obra.");
        bindCards();
      }

      async function renderProfile() {
        state.lastAction = () => renderProfile();
        setRoute("profile", "Perfil");
        setActive("profile");
        loading("Carregando perfil");
        const localProgress = storage.get(progressKey, {});
        const localFavs = storage.get(favoritesKey, {});
        let stats = {
          favorites_count: Object.keys(localFavs).length,
          chapters_read: Object.values(localProgress).length,
          titles_opened: Object.keys(localProgress).length,
          pages_read: Object.values(localProgress).length,
          offline_access: {}
        };
        if (userId !== "guest") stats = await api(`/api/profile?user_id=${encodeURIComponent(userId)}`, { ttl: 30000, timeout: 14000 }).catch(() => stats);
        const access = stats.offline_access || {};
        view.innerHTML = `<section class="section"><div class="section-head"><h2 class="section-title">Perfil</h2><span class="section-count">ID ${escapeHtml(userId)}</span></div><div class="stats">
          <div class="stat"><div class="stat-value">${escapeHtml(stats.favorites_count || 0)}</div><span class="stat-label">Favoritos</span></div>
          <div class="stat"><div class="stat-value">${escapeHtml(stats.chapters_read || 0)}</div><span class="stat-label">Caps lidos</span></div>
          <div class="stat"><div class="stat-value">${escapeHtml(stats.titles_opened || 0)}</div><span class="stat-label">Obras</span></div>
          <div class="stat"><div class="stat-value">${escapeHtml(stats.pages_read || 0)}</div><span class="stat-label">Progresso</span></div>
        </div></section><section class="panel"><div class="chapter-row" style="cursor:default"><span class="chapter-num">${access.is_active ? "OK" : "!"}</span><span class="chapter-info"><strong>Leitura offline</strong><span>${access.is_active ? "PDF e EPUB liberados" : "Sem plano ativo"}</span></span><span class="arrow" style="color:${access.is_active ? "var(--green)" : "var(--text3)"}">●</span></div></section>`;
      }

      async function syncLocal() {
        if (userId === "guest") return;
        const progress = Object.values(storage.get(progressKey, {}));
        const favorites = Object.values(storage.get(favoritesKey, {}));
        if (progress.length) api("/api/progress/sync", { method: "POST", body: JSON.stringify({ user_id: userId, progress }), timeout: 9000 }).catch(() => null);
        if (favorites.length) api("/api/favorites/sync", { method: "POST", body: JSON.stringify({ user_id: userId, favorites }), timeout: 9000 }).catch(() => null);
      }

      function showError(error) {
        const message = clean(error && error.message ? error.message : error) || "Nao consegui carregar esta tela.";
        view.innerHTML = `<div class="error"><div class="empty-inner"><span class="empty-icon">${icon("refresh")}</span><div class="empty-title">Algo saiu do roteiro</div><div class="empty-sub">${escapeHtml(message)}</div><button class="action primary" id="retryBtn" style="margin-top:14px">Tentar novamente</button><button class="action" id="homeBtn" style="margin-top:8px">Voltar ao inicio</button></div></div>`;
        document.getElementById("retryBtn")?.addEventListener("click", () => Promise.resolve(state.lastAction()).catch(showError));
        document.getElementById("homeBtn")?.addEventListener("click", () => renderHome().catch(showError));
      }

      function handleBack() {
        haptic("light");
        if (state.route === "reader" && state.titleId) { openTitle(state.titleId).catch(showError); return; }
        if (state.route !== "home") { renderHome().catch(showError); return; }
        try { tg ? tg.close() : history.back(); } catch (_) {}
      }

      searchForm.addEventListener("submit", event => {
        event.preventDefault();
        renderSearch(searchInput.value).catch(showError);
      });
      searchInput.addEventListener("input", debounce(() => {
        const q = searchInput.value.trim();
        clearSearch.classList.toggle("visible", q.length > 0);
        if (q.length >= 3) renderSearch(q).catch(showError);
      }, 420));
      clearSearch.addEventListener("click", () => { searchInput.value = ""; clearSearch.classList.remove("visible"); searchInput.focus(); });
      backBtn.addEventListener("click", handleBack);
      brandBtn.addEventListener("click", () => renderHome().catch(showError));
      refreshBtn.addEventListener("click", async () => {
        haptic("light");
        cache.clear();
        await api("/api/refresh", { method: "POST" }).catch(() => null);
        Promise.resolve(state.lastAction()).catch(showError);
      });
      document.querySelectorAll(".nav-item").forEach(btn => btn.addEventListener("click", () => {
        haptic("light");
        if (btn.dataset.tab === "home") renderHome().catch(showError);
        if (btn.dataset.tab === "history") renderHistory().catch(showError);
        if (btn.dataset.tab === "favorites") renderFavorites().catch(showError);
        if (btn.dataset.tab === "profile") renderProfile().catch(showError);
      }));
      window.addEventListener("scroll", scheduleSave, { passive: true });
      window.addEventListener("beforeunload", () => { if (state.route === "reader") saveProgress(); });

      async function boot() {
        syncLocal();
        if (state.route === "reader" && state.chapterId) return openReader(state.chapterId, state.titleId);
        if (state.titleId && state.route === "detail") return openTitle(state.titleId);
        if (state.route === "history") return renderHistory();
        if (state.route === "favorites") return renderFavorites();
        if (state.route === "profile") return renderProfile();
        return renderHome();
      }
    })();
  </script>
</body>
</html>
