
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Novels Baltigo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080d;
      --bg-2: #11141c;
      --panel: rgba(19, 22, 31, .92);
      --panel-2: rgba(27, 31, 43, .96);
      --line: rgba(255, 255, 255, .11);
      --line-2: rgba(255, 255, 255, .18);
      --text: #f7f8ff;
      --muted: #aeb5c7;
      --soft: #dce1ee;
      --red: #ff3048;
      --red-2: #a51125;
      --gold: #ffc857;
      --blue: #45c7ff;
      --green: #59d57c;
      --radius: 18px;
      --shadow: 0 24px 80px rgba(0, 0, 0, .42);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 15% -10%, rgba(255, 48, 72, .34), transparent 32rem),
        radial-gradient(circle at 92% 10%, rgba(69, 199, 255, .16), transparent 24rem),
        linear-gradient(155deg, #090912 0%, #151821 48%, #08090f 100%);
      letter-spacing: 0;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0 42%, rgba(255,255,255,.035) 45%, transparent 49%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 88px);
      opacity: .35;
      animation: drift 18s linear infinite;
    }

    button, input { font: inherit; }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      cursor: default;
      opacity: .45;
    }

    img { max-width: 100%; }

    .app {
      position: relative;
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 18px 14px 104px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: 54px 1fr 54px;
      gap: 12px;
      align-items: center;
      padding: 12px 0 14px;
      background: linear-gradient(180deg, rgba(7, 8, 13, .98), rgba(7, 8, 13, .84) 76%, transparent);
      backdrop-filter: blur(14px);
    }

    .brand {
      min-width: 0;
      padding-left: 2px;
    }

    .brand strong {
      display: block;
      font-size: 22px;
      line-height: 1.05;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 14px;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(35, 40, 54, .95), rgba(21, 24, 34, .95));
      border: 1px solid var(--line-2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 12px 28px rgba(0,0,0,.28);
      font-size: 24px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .icon-btn:active,
    .card:active,
    .action:active,
    .chapter-row:active,
    .tab-btn:active {
      transform: scale(.97);
    }

    .search {
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 10px;
      margin: 2px 0 22px;
    }

    .search input {
      min-width: 0;
      height: 58px;
      border: 1px solid var(--line-2);
      border-radius: 16px;
      padding: 0 18px;
      color: var(--text);
      background: rgba(17, 19, 28, .92);
      outline: none;
      font-size: 17px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .search input:focus {
      border-color: rgba(255, 48, 72, .72);
      box-shadow: 0 0 0 4px rgba(255, 48, 72, .11), inset 0 1px 0 rgba(255,255,255,.06);
    }

    .primary,
    .action.hot {
      background: linear-gradient(135deg, var(--red), #ff5a40);
      color: white;
      box-shadow: 0 16px 32px rgba(255, 48, 72, .28);
    }

    .primary {
      border-radius: 16px;
      font-size: 22px;
      font-weight: 900;
    }

    h1, h2, h3, p { margin: 0; }

    h2 {
      font-size: 22px;
      line-height: 1.1;
      font-weight: 900;
    }

    .section {
      margin: 22px 0 28px;
      animation: rise .35s ease both;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 12px;
    }

    .muted { color: var(--muted); }

    .rail {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(172px, 36%);
      gap: 14px;
      overflow-x: auto;
      padding: 1px 2px 8px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }

    .rail::-webkit-scrollbar { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(164px, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(25, 29, 39, .96), rgba(16, 18, 27, .96));
      border: 1px solid var(--line-2);
      scroll-snap-align: start;
      text-align: left;
      box-shadow: var(--shadow);
      transform-origin: center;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      animation: pop .35s ease both;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,.08), transparent 58%);
      transform: translateX(-120%);
      transition: transform .42s ease;
    }

    .card:active::after { transform: translateX(120%); }

    .cover-wrap {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255,48,72,.22), rgba(69,199,255,.12));
    }

    .cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.01);
    }

    .cover-fallback {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 18px;
      color: rgba(255,255,255,.82);
      font-weight: 900;
      text-align: center;
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,.18), transparent 10rem),
        linear-gradient(135deg, #38111b, #151927 55%, #0c1018);
    }

    .cap-badge {
      position: absolute;
      left: 10px;
      bottom: 10px;
      max-width: calc(100% - 20px);
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(0,0,0,.66);
      border: 1px solid rgba(255,255,255,.12);
      color: white;
      font-size: 12px;
      font-weight: 800;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-body {
      padding: 13px 13px 15px;
    }

    .card-title {
      min-height: 42px;
      font-weight: 900;
      line-height: 1.16;
      font-size: 16px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spotlight {
      position: relative;
      display: grid;
      min-height: 330px;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--line-2);
      background: #11141c;
      box-shadow: var(--shadow);
      animation: rise .42s ease both;
    }

    .spotlight-bg {
      grid-area: 1 / 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.06) brightness(.56);
      transform: scale(1.02);
    }

    .spotlight-fallback {
      grid-area: 1 / 1;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,48,72,.45), transparent 18rem),
        linear-gradient(135deg, #36101a, #11141d 62%, #07121a);
    }

    .spotlight-info {
      grid-area: 1 / 1;
      align-self: end;
      padding: 22px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.85) 78%);
    }

    .spotlight-info h1 {
      max-width: 780px;
      font-size: clamp(34px, 10vw, 64px);
      line-height: .95;
      font-weight: 950;
      text-shadow: 0 6px 22px rgba(0,0,0,.45);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.11);
      color: var(--soft);
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }

    .detail {
      display: grid;
      gap: 18px;
      animation: rise .32s ease both;
    }

    .detail-hero {
      position: relative;
      display: grid;
      grid-template-columns: 122px 1fr;
      gap: 16px;
      min-height: 190px;
      padding: 16px;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--line-2);
      background: linear-gradient(135deg, rgba(34, 14, 24, .94), rgba(16, 20, 30, .96));
      box-shadow: var(--shadow);
    }

    .detail-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--hero-image, none) center / cover;
      filter: blur(26px) saturate(1.1) brightness(.45);
      opacity: .52;
      transform: scale(1.14);
    }

    .poster,
    .detail-info {
      position: relative;
      z-index: 1;
    }

    .poster {
      width: 122px;
      aspect-ratio: 3 / 4;
      border-radius: 18px;
      object-fit: cover;
      background: linear-gradient(135deg, rgba(255,48,72,.25), rgba(69,199,255,.12));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 40px rgba(0,0,0,.4);
    }

    .detail-info {
      min-width: 0;
      align-self: center;
    }

    .detail-title {
      font-size: clamp(25px, 7vw, 42px);
      line-height: 1.02;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .action {
      min-height: 50px;
      border-radius: 15px;
      padding: 0 14px;
      font-weight: 900;
      background: linear-gradient(180deg, rgba(35,40,54,.98), rgba(22,25,35,.98));
      border: 1px solid var(--line-2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action.good {
      background: linear-gradient(135deg, #176b3b, #2fb66a);
    }

    .action.blue {
      background: linear-gradient(135deg, #155476, #2898c7);
    }

    .synopsis-box {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(13, 15, 23, .66);
    }

    .synopsis {
      color: #e2e6f1;
      font-size: 16px;
      line-height: 1.72;
    }

    .synopsis.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .text-btn {
      margin-top: 12px;
      padding: 0;
      color: var(--blue);
      background: transparent;
      font-weight: 800;
    }

    .chapter-tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin: 0 0 12px;
    }

    .chapter-tools input {
      min-width: 0;
      height: 44px;
      border-radius: 13px;
      border: 1px solid var(--line);
      padding: 0 13px;
      color: var(--text);
      background: rgba(15, 17, 25, .88);
      outline: none;
    }

    .chapter-list {
      display: grid;
      gap: 10px;
    }

    .chapter-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 62px;
      padding: 12px 14px;
      text-align: left;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(24, 28, 39, .94), rgba(15, 18, 27, .94));
      border: 1px solid var(--line);
      box-shadow: 0 12px 32px rgba(0,0,0,.2);
      transition: transform .18s ease, border-color .18s ease;
      animation: rowIn .28s ease both;
    }

    .chapter-row strong {
      font-size: 16px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .chapter-row span {
      margin-top: 3px;
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .chapter-row .arrow {
      color: var(--red);
      font-size: 20px;
      font-weight: 900;
    }

    .empty, .loading {
      position: relative;
      overflow: hidden;
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
      border-radius: 20px;
      background: rgba(18, 21, 30, .78);
      border: 1px solid var(--line);
    }

    .loading::after,
    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, transparent 35%, rgba(255,255,255,.08), transparent 65%);
      transform: translateX(-100%);
      animation: shimmer 1.15s infinite;
    }

    .skeleton-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(172px, 36%);
      gap: 14px;
      overflow: hidden;
    }

    .skeleton {
      position: relative;
      height: 286px;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
    }

    .reader-mode .search,
    .reader-mode .bottom-nav {
      display: none;
    }

    .reader-mode .app {
      padding-bottom: 22px;
    }

    .reader {
      display: grid;
      gap: 14px;
      animation: rise .28s ease both;
    }

    .reader-head {
      position: sticky;
      top: 78px;
      z-index: 12;
      padding: 12px;
      border-radius: 18px;
      background: rgba(13, 15, 22, .88);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .reader-title {
      font-size: 18px;
      font-weight: 950;
      line-height: 1.2;
    }

    .reader-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress {
      height: 6px;
      margin-top: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--gold));
      transition: width .22s ease;
    }

    .reader-tools {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .tool {
      min-width: 38px;
      height: 36px;
      border-radius: 11px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .reader-page {
      padding: 24px 18px;
      border-radius: 22px;
      background: rgba(246, 242, 232, .98);
      color: #171513;
      box-shadow: var(--shadow);
      min-height: calc(100vh - 250px);
    }

    .reader-page.dark {
      background: rgba(13, 15, 22, .94);
      color: #e9edf7;
      border: 1px solid var(--line);
    }

    .reader-page p {
      margin: 0 0 1.08em;
      font-size: var(--reader-font, 19px);
      line-height: 1.82;
    }

    .reader-controls {
      position: sticky;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(16, 19, 28, .94);
      border: 1px solid var(--line-2);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 40;
      transform: translateX(-50%);
      width: min(calc(100% - 22px), 560px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px;
      border-radius: 22px;
      background: rgba(18, 21, 30, .94);
      border: 1px solid var(--line-2);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .tab-btn {
      min-width: 0;
      height: 58px;
      border-radius: 16px;
      display: inline-flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      font-size: 12px;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
    }

    .tab-btn b {
      font-size: 18px;
      line-height: 1;
    }

    .tab-btn.active {
      color: white;
      background: linear-gradient(135deg, rgba(255,48,72,.32), rgba(255,48,72,.12));
      border-color: rgba(255,48,72,.42);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      min-height: 104px;
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(25,29,40,.94), rgba(14,16,24,.94));
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(0,0,0,.22);
    }

    .stat strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      font-weight: 950;
      color: white;
    }

    .stat span {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(80px, 0, 0); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    @media (min-width: 760px) {
      .app { padding-top: 22px; }
      .rail { grid-auto-columns: minmax(180px, 21%); }
      .skeleton-grid { grid-auto-columns: minmax(180px, 21%); }
      .actions { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .detail-hero { grid-template-columns: 160px 1fr; min-height: 250px; }
      .poster { width: 160px; }
      .reader-page { padding: 40px 48px; }
    }

    @media (max-width: 390px) {
      .brand strong { font-size: 19px; }
      .rail { grid-auto-columns: minmax(150px, 43%); }
      .grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); }
      .detail-hero { grid-template-columns: 96px 1fr; }
      .poster { width: 96px; border-radius: 14px; }
      .actions { grid-template-columns: 1fr; }
      .action { min-height: 46px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="icon-btn" id="backBtn" title="Voltar">‹</button>
      <div class="brand">
        <strong>Novels Baltigo</strong>
        <span id="subtitle">Inicio</span>
      </div>
      <button class="icon-btn" id="refreshBtn" title="Atualizar">↻</button>
    </header>

    <form class="search" id="searchForm">
      <input id="searchInput" autocomplete="off" placeholder="Buscar novel">
      <button class="primary" type="submit" title="Buscar">⌕</button>
    </form>

    <section id="view"></section>
  </main>

  <nav class="bottom-nav">
    <button class="tab-btn active" data-tab="home"><b>⌂</b><span>Inicio</span></button>
    <button class="tab-btn" data-tab="history"><b>◴</b><span>Historico</span></button>
    <button class="tab-btn" data-tab="favorites"><b>★</b><span>Favoritos</span></button>
    <button class="tab-btn" data-tab="profile"><b>☻</b><span>Perfil</span></button>
  </nav>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const qs = new URLSearchParams(location.search);
    const apiBase = location.origin;
    const user = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : {};
    const userId = String(qs.get("user_id") || user.id || "guest");
    const state = {
      route: qs.get("route") || (qs.get("chapter_id") ? "reader" : qs.get("title_id") ? "detail" : "home"),
      titleId: qs.get("title_id") || qs.get("id") || qs.get("novel_id") || "",
      chapterId: qs.get("chapter_id") || qs.get("read") || qs.get("cap") || "",
      currentTitle: null,
      currentChapter: null,
      currentPages: [],
      currentPage: 1,
      readerFont: Number(localStorage.getItem("novel_reader_font") || 19),
      readerDark: localStorage.getItem("novel_reader_dark") === "1"
    };

    const view = document.getElementById("view");
    const subtitle = document.getElementById("subtitle");
    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const backBtn = document.getElementById("backBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const storage = {
      get(key, fallback) {
        try {
          const value = JSON.parse(localStorage.getItem(key));
          return value ?? fallback;
        } catch (_) {
          return fallback;
        }
      },
      set(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }
    };

    const localProgressKey = `novel_progress:${userId}`;
    const localFavoritesKey = `novel_favorites:${userId}`;

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    async function api(path, options = {}) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), options.timeout || 18000);
      try {
        const response = await fetch(`${apiBase}${path}`, {
          headers: { "Content-Type": "application/json" },
          cache: "no-store",
          ...options,
          signal: controller.signal
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.detail || `HTTP ${response.status}`);
        }
        return response.json();
      } catch (error) {
        if (error.name === "AbortError") {
          throw new Error("Demorou demais para carregar. Tente de novo.");
        }
        throw error;
      } finally {
        clearTimeout(timeout);
      }
    }

    function chapterNumberText(value) {
      if (!value) return "";
      if (typeof value === "object") return value.chapter_number || value.chapter_id || "";
      return value;
    }

    function coverOf(item) {
      return item.cover_url || item.background_url || item.banner_url || "";
    }

    function setRoute(route, label) {
      state.route = route;
      subtitle.textContent = label || route;
      document.body.classList.toggle("reader-mode", route === "reader");
    }

    function skeletonHome() {
      view.innerHTML = `
        <section class="section">
          <div class="section-head"><h2>Carregando</h2><span class="muted">aguarde</span></div>
          <div class="skeleton-grid">
            <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
          </div>
        </section>
        <section class="section">
          <div class="skeleton" style="height:130px"></div>
        </section>`;
    }

    function setLoading(text = "Carregando") {
      view.innerHTML = `<div class="loading">${escapeHtml(text)}</div>`;
    }

    function empty(text, action = "") {
      return `<div class="empty">${escapeHtml(text)}${action}</div>`;
    }

    function imageOrFallback(src, title, cls = "cover") {
      if (!src) return `<div class="cover-fallback ${cls}">${escapeHtml(title || "Novel")}</div>`;
      return `<img class="${cls}" src="${escapeHtml(src)}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'cover-fallback ${cls}',textContent:'${escapeHtml(title || "Novel").replace(/'/g, "\\'")}'}))">`;
    }

    function card(item, index = 0) {
      const title = item.display_title || item.title || "Novel";
      const chapter = chapterNumberText(item.latest_chapter || item.chapter_number);
      const cover = coverOf(item);
      return `
        <button class="card" data-title="${escapeHtml(item.title_id)}" style="animation-delay:${Math.min(index * 35, 280)}ms">
          <div class="cover-wrap">
            ${imageOrFallback(cover, title)}
            ${chapter ? `<span class="cap-badge">Cap. ${escapeHtml(chapter)}</span>` : ""}
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(title)}</div>
            <div class="card-meta">${escapeHtml(item.status || item.type || "Novel")}</div>
          </div>
        </button>`;
    }

    function bindCards(root = view) {
      root.querySelectorAll("[data-title]").forEach(button => {
        button.addEventListener("click", () => openTitle(button.dataset.title).catch(showError));
      });
    }

    function section(title, items, rail = true) {
      if (!items || !items.length) return "";
      return `
        <section class="section">
          <div class="section-head">
            <h2>${escapeHtml(title)}</h2>
            <span class="muted">${items.length}</span>
          </div>
          <div class="${rail ? "rail" : "grid"}">${items.map(card).join("")}</div>
        </section>`;
    }

    function spotlight(item) {
      if (!item) return "";
      const title = item.display_title || item.title || "Novel";
      const cover = coverOf(item);
      const chapter = chapterNumberText(item.latest_chapter || item.chapter_number);
      return `
        <button class="spotlight" data-title="${escapeHtml(item.title_id)}">
          ${cover ? `<img class="spotlight-bg" src="${escapeHtml(cover)}" alt="">` : `<div class="spotlight-fallback"></div>`}
          <div class="spotlight-info">
            <h1>${escapeHtml(title)}</h1>
            <div class="chips">
              ${chapter ? `<span class="chip">Cap. ${escapeHtml(chapter)}</span>` : ""}
              <span class="chip">${escapeHtml(item.status || "Novel")}</span>
              <span class="chip">Abrir obra</span>
            </div>
          </div>
        </button>`;
    }

    async function renderHome() {
      setRoute("home", "Inicio");
      setActiveTab("home");
      skeletonHome();
      const data = await api("/api/home?limit=18", { timeout: 22000 });
      const latest = data.latest_titles || data.recent_titles || [];
      const catalog = data.featured || data.popular || [];
      const hero = latest[0] || catalog[0];
      view.innerHTML = [
        spotlight(hero),
        section("Atualizadas agora", latest.slice(hero ? 1 : 0), true),
        section("Catalogo", catalog, true),
      ].join("") || empty("Nenhuma novel carregada agora.");
      bindCards();
    }

    function sortChapters(chapters) {
      return [...(chapters || [])].sort((a, b) => {
        const na = parseFloat(String(a.chapter_number || "").replace(",", "."));
        const nb = parseFloat(String(b.chapter_number || "").replace(",", "."));
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return nb - na;
        return String(b.chapter_number || "").localeCompare(String(a.chapter_number || ""));
      });
    }

    function latestChapter(title) {
      const latest = title.latest_chapter;
      if (latest && typeof latest === "object" && latest.chapter_id) return latest;
      if (title.latest_chapter_id) {
        return { chapter_id: title.latest_chapter_id, chapter_number: chapterNumberText(title.latest_chapter) };
      }
      const sorted = sortChapters(title.chapters || []);
      return sorted[0] || null;
    }

    function firstChapter(title) {
      const sorted = sortChapters(title.chapters || []);
      return sorted[sorted.length - 1] || latestChapter(title);
    }

    async function openTitle(titleId) {
      if (!titleId) return;
      setRoute("detail", "Obra");
      setActiveTab("");
      setLoading("Abrindo obra");
      state.titleId = titleId;
      const title = await api(`/api/title/${encodeURIComponent(titleId)}?user_id=${encodeURIComponent(userId)}`, { timeout: 26000 });
      state.currentTitle = title;
      renderTitle(title);
    }

    function renderTitle(title) {
      const chapters = sortChapters(title.chapters || []);
      const latest = latestChapter(title);
      const first = firstChapter(title);
      const lastRead = title.last_read;
      const favs = storage.get(localFavoritesKey, {});
      const isFav = Boolean(favs[title.title_id]);
      const cover = coverOf(title);
      const titleText = title.title || title.display_title || "Novel";
      const safeCover = cover ? `url('${cover.replace(/'/g, "%27")}')` : "none";

      view.innerHTML = `
        <section class="detail" style="--hero-image:${safeCover}">
          <div class="detail-hero">
            ${cover ? `<img class="poster" src="${escapeHtml(cover)}" alt="">` : `<div class="poster cover-fallback">${escapeHtml(titleText)}</div>`}
            <div class="detail-info">
              <h1 class="detail-title">${escapeHtml(titleText)}</h1>
              <div class="chips">
                <span class="chip">${escapeHtml(title.status || "Status")}</span>
                <span class="chip">${escapeHtml(title.type || "Novel")}</span>
                <span class="chip">${escapeHtml(title.total_chapters || chapters.length || "?")} caps</span>
              </div>
              <div class="actions">
                ${lastRead && lastRead.chapter_id ? `<button class="action hot" id="continueBtn">Continuar</button>` : ""}
                ${latest && latest.chapter_id ? `<button class="action blue" id="latestBtn">Ultimo cap.</button>` : ""}
                ${first && first.chapter_id ? `<button class="action" id="firstBtn">Comecar</button>` : ""}
                <button class="action good" id="favBtn">${isFav ? "Favoritado" : "Favoritar"}</button>
              </div>
            </div>
          </div>

          <div class="synopsis-box">
            <p class="synopsis collapsed" id="synopsis">${escapeHtml(title.description || "Sem sinopse disponivel.")}</p>
            <button class="text-btn" id="synopsisBtn">Mostrar sinopse completa</button>
          </div>

          <section class="section">
            <div class="section-head">
              <h2>Capitulos</h2>
              <span class="muted" id="chapterCount">${chapters.length}</span>
            </div>
            <div class="chapter-tools">
              <input id="chapterFilter" placeholder="Filtrar capitulo">
              <button class="action" id="retryTitleBtn" title="Atualizar capitulos">↻</button>
            </div>
            <div class="chapter-list" id="chapterList"></div>
          </section>
        </section>`;

      document.getElementById("continueBtn")?.addEventListener("click", () => openReader(lastRead.chapter_id, title.title_id).catch(showError));
      document.getElementById("latestBtn")?.addEventListener("click", () => openReader(latest.chapter_id, title.title_id).catch(showError));
      document.getElementById("firstBtn")?.addEventListener("click", () => openReader(first.chapter_id, title.title_id).catch(showError));
      document.getElementById("favBtn")?.addEventListener("click", () => toggleFavorite(title).catch(showError));
      document.getElementById("retryTitleBtn")?.addEventListener("click", async () => {
        await api("/api/refresh", { method: "POST" }).catch(() => null);
        await openTitle(title.title_id);
      });
      document.getElementById("synopsisBtn")?.addEventListener("click", () => {
        const synopsis = document.getElementById("synopsis");
        const collapsed = synopsis.classList.toggle("collapsed");
        document.getElementById("synopsisBtn").textContent = collapsed ? "Mostrar sinopse completa" : "Recolher sinopse";
      });

      const filter = document.getElementById("chapterFilter");
      filter.addEventListener("input", () => renderChapterList(chapters, filter.value, title.title_id));
      renderChapterList(chapters, "", title.title_id);
    }

    function renderChapterList(chapters, query, titleId) {
      const list = document.getElementById("chapterList");
      if (!list) return;
      const q = String(query || "").trim().toLowerCase();
      const filtered = chapters.filter(chapter => {
        const text = `${chapter.chapter_number || ""} ${chapter.chapter_title || ""}`.toLowerCase();
        return !q || text.includes(q);
      });
      document.getElementById("chapterCount").textContent = filtered.length;
      if (!filtered.length) {
        list.innerHTML = empty("Nenhum capitulo carregado. Toque em atualizar.");
        return;
      }
      list.innerHTML = filtered.map((chapter, index) => `
        <button class="chapter-row" data-chapter="${escapeHtml(chapter.chapter_id)}" style="animation-delay:${Math.min(index * 18, 220)}ms">
          <div>
            <strong>Capitulo ${escapeHtml(chapter.chapter_number || "?")}</strong>
            <span>${escapeHtml(chapter.chapter_title || "Ler agora")}</span>
          </div>
          <div class="arrow">›</div>
        </button>
      `).join("");
      list.querySelectorAll("[data-chapter]").forEach(button => {
        button.addEventListener("click", () => openReader(button.dataset.chapter, titleId).catch(showError));
      });
    }

    async function toggleFavorite(title) {
      const favs = storage.get(localFavoritesKey, {});
      const exists = Boolean(favs[title.title_id]);
      if (exists) {
        delete favs[title.title_id];
      } else {
        favs[title.title_id] = {
          title_id: title.title_id,
          title: title.title,
          display_title: title.display_title || title.title,
          cover_url: title.cover_url,
          background_url: title.background_url || title.banner_url,
          latest_chapter: latestChapter(title),
          status: title.status,
          added_at: Date.now(),
          updated_at: Date.now()
        };
      }
      storage.set(localFavoritesKey, favs);
      renderTitle(title);
      if (userId !== "guest") {
        await api("/api/favorites", {
          method: "POST",
          body: JSON.stringify({ ...(favs[title.title_id] || {}), user_id: userId, title_id: title.title_id, favorite: !exists })
        }).catch(() => null);
      }
    }

    function chunkParagraphs(paragraphs) {
      const clean = (paragraphs || []).map(item => String(item || "").trim()).filter(Boolean);
      const pages = [];
      let bucket = [];
      let chars = 0;
      for (const paragraph of clean) {
        if (bucket.length && (bucket.length >= 5 || chars + paragraph.length > 2300)) {
          pages.push(bucket);
          bucket = [];
          chars = 0;
        }
        bucket.push(paragraph);
        chars += paragraph.length;
      }
      if (bucket.length) pages.push(bucket);
      return pages.length ? pages : [["Nao consegui carregar o texto deste capitulo agora. Tente atualizar ou abrir outro capitulo."]];
    }

    async function openReader(chapterId, titleId = "") {
      if (!chapterId) return;
      setRoute("reader", "Leitor");
      setActiveTab("");
      setLoading("Abrindo capitulo");
      state.chapterId = chapterId;
      state.titleId = titleId || state.titleId;
      const chapter = await api(`/api/chapter/${encodeURIComponent(chapterId)}`, { timeout: 26000 });
      state.currentChapter = chapter;
      state.titleId = chapter.title_id || state.titleId;
      state.currentPages = chunkParagraphs(chapter.paragraphs || []);

      const localProgress = storage.get(localProgressKey, {});
      const remoteProgress = userId !== "guest" && state.titleId
        ? await api(`/api/progress?user_id=${encodeURIComponent(userId)}&title_id=${encodeURIComponent(state.titleId)}`).catch(() => ({}))
        : {};
      const stored = localProgress[state.titleId] || remoteProgress || {};
      state.currentPage = stored && stored.chapter_id === chapter.chapter_id
        ? Math.min(Math.max(1, Number(stored.page_index || 1)), state.currentPages.length)
        : 1;
      renderReader();
    }

    function renderReader() {
      const chapter = state.currentChapter;
      const page = state.currentPages[state.currentPage - 1] || [];
      const progress = Math.round((state.currentPage / Math.max(1, state.currentPages.length)) * 100);
      document.documentElement.style.setProperty("--reader-font", `${state.readerFont}px`);
      view.innerHTML = `
        <section class="reader">
          <div class="reader-head">
            <div class="reader-title">${escapeHtml(chapter.title || "Novel")}</div>
            <div class="reader-meta">
              <span>Cap. ${escapeHtml(chapter.chapter_number || "?")}</span>
              <span>${state.currentPage}/${state.currentPages.length}</span>
            </div>
            <div class="progress" style="--progress:${progress}%"><span></span></div>
            <div class="reader-tools">
              <button class="tool" id="fontDown">A-</button>
              <button class="tool" id="fontUp">A+</button>
              <button class="tool" id="themeToggle">${state.readerDark ? "☾" : "☼"}</button>
            </div>
          </div>
          <article class="reader-page ${state.readerDark ? "dark" : ""}">
            ${page.map(paragraph => `<p>${escapeHtml(paragraph)}</p>`).join("")}
          </article>
          <div class="reader-controls">
            <button class="action" id="prevPage" ${state.currentPage <= 1 ? "disabled" : ""}>Anterior</button>
            <span class="muted">${progress}%</span>
            <button class="action hot" id="nextPage">${state.currentPage >= state.currentPages.length ? "Proximo cap." : "Proxima"}</button>
          </div>
        </section>`;

      document.getElementById("prevPage").addEventListener("click", () => {
        if (state.currentPage > 1) {
          state.currentPage -= 1;
          renderReader();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
      document.getElementById("nextPage").addEventListener("click", () => {
        if (state.currentPage < state.currentPages.length) {
          state.currentPage += 1;
          renderReader();
          window.scrollTo({ top: 0, behavior: "smooth" });
        } else if (chapter.next_chapter && chapter.next_chapter.chapter_id) {
          openReader(chapter.next_chapter.chapter_id, chapter.title_id).catch(showError);
        }
      });
      document.getElementById("fontDown").addEventListener("click", () => {
        state.readerFont = Math.max(15, state.readerFont - 1);
        localStorage.setItem("novel_reader_font", String(state.readerFont));
        renderReader();
      });
      document.getElementById("fontUp").addEventListener("click", () => {
        state.readerFont = Math.min(24, state.readerFont + 1);
        localStorage.setItem("novel_reader_font", String(state.readerFont));
        renderReader();
      });
      document.getElementById("themeToggle").addEventListener("click", () => {
        state.readerDark = !state.readerDark;
        localStorage.setItem("novel_reader_dark", state.readerDark ? "1" : "0");
        renderReader();
      });
      saveProgress();
    }

    async function saveProgress() {
      const chapter = state.currentChapter;
      if (!chapter || !state.titleId) return;
      const payload = {
        user_id: userId,
        title_id: state.titleId,
        title_name: chapter.title || "",
        chapter_id: chapter.chapter_id,
        chapter_number: chapter.chapter_number || "",
        chapter_url: chapter.chapter_url || "",
        page_index: state.currentPage,
        total_pages: state.currentPages.length,
        cover_url: chapter.cover_url || (state.currentTitle && state.currentTitle.cover_url) || "",
        updated_at: Date.now()
      };
      const localProgress = storage.get(localProgressKey, {});
      localProgress[state.titleId] = payload;
      storage.set(localProgressKey, localProgress);
      if (userId !== "guest") {
        api("/api/progress", { method: "POST", body: JSON.stringify(payload), timeout: 8000 }).catch(() => null);
      }
    }

    async function renderSearch(query) {
      setRoute("search", "Busca");
      setActiveTab("");
      setLoading("Buscando");
      const data = await api(`/api/search?q=${encodeURIComponent(query)}&limit=30`, { timeout: 22000 });
      view.innerHTML = section(`Busca: ${query}`, data.results || [], false) || empty("Nada encontrado.");
      bindCards();
    }

    async function renderHistory() {
      setRoute("history", "Historico");
      setActiveTab("history");
      const localProgress = storage.get(localProgressKey, {});
      let items = Object.values(localProgress).sort((a, b) => Number(b.updated_at || 0) - Number(a.updated_at || 0));
      if (userId !== "guest") {
        const remote = await api(`/api/history?user_id=${encodeURIComponent(userId)}&limit=120`, { timeout: 12000 }).catch(() => null);
        if (remote && remote.items && remote.items.length) items = remote.items;
      }
      view.innerHTML = `
        <section class="section">
          <div class="section-head"><h2>Historico</h2><span class="muted">${items.length}</span></div>
          <div class="chapter-list">
            ${items.map((item, index) => `
              <button class="chapter-row" data-history-chapter="${escapeHtml(item.chapter_id)}" data-history-title="${escapeHtml(item.title_id)}" style="animation-delay:${Math.min(index * 18, 220)}ms">
                <div>
                  <strong>${escapeHtml(item.title_name || "Novel")}</strong>
                  <span>Cap. ${escapeHtml(item.chapter_number || "?")} · pagina ${escapeHtml(item.page_index || 1)}/${escapeHtml(item.total_pages || 1)}</span>
                </div>
                <div class="arrow">›</div>
              </button>
            `).join("") || empty("Seu historico vai aparecer aqui.")}
          </div>
        </section>`;
      view.querySelectorAll("[data-history-chapter]").forEach(button => {
        button.addEventListener("click", () => openReader(button.dataset.historyChapter, button.dataset.historyTitle).catch(showError));
      });
    }

    async function renderFavorites() {
      setRoute("favorites", "Favoritos");
      setActiveTab("favorites");
      let favs = Object.values(storage.get(localFavoritesKey, {}));
      if (userId !== "guest") {
        const remote = await api(`/api/favorites?user_id=${encodeURIComponent(userId)}`, { timeout: 12000 }).catch(() => null);
        if (remote && remote.items) favs = remote.items;
      }
      view.innerHTML = section("Favoritos", favs, false) || empty("Nenhum favorito ainda.");
      bindCards();
    }

    async function renderProfile() {
      setRoute("profile", "Perfil");
      setActiveTab("profile");
      const localProgress = storage.get(localProgressKey, {});
      const localFavs = storage.get(localFavoritesKey, {});
      let stats = {
        favorites_count: Object.keys(localFavs).length,
        chapters_read: Object.values(localProgress).length,
        titles_opened: Object.keys(localProgress).length,
        pages_read: Object.values(localProgress).reduce((sum, item) => sum + Number(item.page_index || 1), 0),
        offline_access: {}
      };
      if (userId !== "guest") {
        stats = await api(`/api/profile?user_id=${encodeURIComponent(userId)}`, { timeout: 12000 }).catch(() => stats);
      }
      const access = stats.offline_access || {};
      view.innerHTML = `
        <section class="section">
          <div class="section-head"><h2>Seu perfil</h2><span class="muted">ID ${escapeHtml(userId)}</span></div>
          <div class="stats">
            <div class="stat"><strong>${escapeHtml(stats.favorites_count || 0)}</strong><span>Favoritos</span></div>
            <div class="stat"><strong>${escapeHtml(stats.chapters_read || 0)}</strong><span>Caps lidos</span></div>
            <div class="stat"><strong>${escapeHtml(stats.titles_opened || 0)}</strong><span>Obras abertas</span></div>
            <div class="stat"><strong>${escapeHtml(stats.pages_read || 0)}</strong><span>Paginas lidas</span></div>
          </div>
        </section>
        <section class="section">
          <button class="chapter-row">
            <div>
              <strong>Offline</strong>
              <span>${access.is_active ? "PDF e EPUB liberados" : "sem plano ativo"}</span>
            </div>
            <div class="arrow">${access.is_active ? "✓" : "!"}</div>
          </button>
        </section>`;
    }

    function setActiveTab(tab) {
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
    }

    function showError(error) {
      setRoute(state.route === "reader" ? "reader" : state.route, subtitle.textContent);
      view.innerHTML = empty(error.message || "Nao consegui carregar agora.", `<br><br><button class="action hot" id="retryBtn">Tentar de novo</button>`);
      document.getElementById("retryBtn")?.addEventListener("click", () => boot(true).catch(showError));
    }

    async function syncLocal() {
      if (userId === "guest") return;
      const progress = Object.values(storage.get(localProgressKey, {}));
      const favorites = Object.values(storage.get(localFavoritesKey, {}));
      if (progress.length) {
        await api("/api/progress/sync", { method: "POST", body: JSON.stringify({ user_id: userId, progress }), timeout: 9000 }).catch(() => null);
      }
      if (favorites.length) {
        await api("/api/favorites/sync", { method: "POST", body: JSON.stringify({ user_id: userId, favorites }), timeout: 9000 }).catch(() => null);
      }
    }

    searchForm.addEventListener("submit", event => {
      event.preventDefault();
      const query = searchInput.value.trim();
      if (query.length >= 2) renderSearch(query).catch(showError);
    });

    backBtn.addEventListener("click", () => {
      if (state.route === "reader" && state.titleId) return openTitle(state.titleId).catch(showError);
      if (state.route !== "home") return renderHome().catch(showError);
      if (tg) tg.close();
    });

    refreshBtn.addEventListener("click", async () => {
      await api("/api/refresh", { method: "POST" }).catch(() => null);
      boot(true).catch(showError);
    });

    document.querySelectorAll(".tab-btn").forEach(button => {
      button.addEventListener("click", () => {
        const tab = button.dataset.tab;
        if (tab === "home") renderHome().catch(showError);
        if (tab === "history") renderHistory().catch(showError);
        if (tab === "favorites") renderFavorites().catch(showError);
        if (tab === "profile") renderProfile().catch(showError);
      });
    });

    async function boot(forceHome = false) {
      syncLocal().catch(() => null);
      if (!forceHome && state.route === "reader" && state.chapterId) return openReader(state.chapterId, state.titleId);
      if (!forceHome && state.titleId && ["detail", "chapters"].includes(state.route)) return openTitle(state.titleId);
      return renderHome();
    }

    boot().catch(showError);
  </script>
</body>
</html>
