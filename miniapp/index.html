  <style>

.chapter-arrow{color:var(--muted);font-size:24px;text-align:right}.load-more{width:calc(100% - 28px);margin:12px 14px 14px}

    .bottom-nav{position:fixed;left:50%;bottom:max(10px,var(--safe-bottom));transform:translateX(-50%);z-index:40;width:min(calc(100% - 20px),530px);display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:6px;border-radius:8px;background:rgba(8,8,18,.94);border:1px solid var(--line);backdrop-filter:blur(20px);box-shadow:var(--shadow)}.tab-btn{min-width:0;height:54px;border-radius:8px;background:transparent;color:var(--muted);font-size:11px;font-weight:800}.tab-btn b{display:block;font-size:19px;line-height:1;margin-bottom:3px}.tab-btn.active{color:#fff;background:linear-gradient(135deg,rgba(109,75,242,.34),rgba(226,86,117,.16));border:1px solid rgba(255,255,255,.10)}body.reader-mode .bottom-nav{display:none}body.reader-mode .app{padding-bottom:calc(22px + var(--safe-bottom))}
    .loading,.empty,.error-box{display:grid;place-items:center;min-height:310px;padding:28px 18px;text-align:center;border-radius:8px;border:1px solid var(--line);background:rgba(13,12,28,.72);box-shadow:var(--shadow)}.loading-icon,.empty-icon{font-size:36px;filter:drop-shadow(0 10px 26px rgba(155,105,255,.32))}.loading-text,.empty-text{margin-top:12px;font-size:17px;font-weight:900}.empty-sub{margin-top:6px;max-width:420px;color:var(--muted);font-size:13px;line-height:1.5}.retry-btn{margin-top:14px;min-height:43px;border-radius:8px;padding:0 18px;color:#fff;background:linear-gradient(135deg,var(--purple2),#44218f);font-weight:900}.skeleton{position:relative;overflow:hidden;border-radius:8px;background:rgba(255,255,255,.06)}.skeleton::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);animation:shimmer 1.3s infinite}.skeleton-rail{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(150px,31%);gap:12px;overflow:hidden}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{border-radius:8px;border:1px solid var(--line);background:rgba(17,16,31,.88);padding:16px}.stat-value{color:var(--gold);font:900 30px/1 Cinzel,serif}.stat-label{display:block;margin-top:6px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase}.history-row{grid-template-columns:50px 1fr 28px}.history-thumb,.history-thumb-fallback{width:50px;height:68px;border-radius:8px;overflow:hidden}
    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes rowIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}@keyframes shimmer{100%{transform:translateX(100%)}}@media (min-width:760px){.app{padding-inline:18px}.rail,.skeleton-rail{grid-auto-columns:minmax(166px,20%)}.detail-hero{grid-template-columns:154px 1fr;padding:18px}.poster,.poster-fallback{width:154px}.actions{grid-template-columns:repeat(4,minmax(0,1fr))}.stats{grid-template-columns:repeat(4,minmax(0,1fr))}.spotlight{min-height:390px}}@media (max-width:390px){.app{padding-inline:10px}.rail,.skeleton-rail{grid-auto-columns:minmax(136px,45%)}.grid{grid-template-columns:repeat(auto-fill,minmax(134px,1fr))}.detail-hero{grid-template-columns:94px 1fr}.poster,.poster-fallback{width:94px}.actions{grid-template-columns:1fr}.chapter-row{grid-template-columns:52px 1fr 20px;padding-inline:10px}.chapter-num{width:44px;height:44px}}@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}

<body>
  <main class="app">
    <header class="topbar">
      <button class="icon-btn" id="backBtn" title="Voltar" aria-label="Voltar">‹</button>
      <div class="brand"><div class="brand-name">Novels Baltigo</div><div class="brand-sub" id="subtitle">Início</div></div>
      <button class="icon-btn" id="refreshBtn" title="Atualizar" aria-label="Atualizar">↻</button>
    </header>
    <form class="search" id="searchForm"><div class="search-wrap"><input id="searchInput" autocomplete="off" placeholder="Buscar novel, título ou gênero" aria-label="Buscar novel"></div><button class="btn-search" type="submit" title="Buscar" aria-label="Buscar">⌕</button></form>
    <section id="view" aria-live="polite"></section>
  </main>
  <nav class="bottom-nav" aria-label="Navegação principal">
    <button class="tab-btn active" data-tab="home"><b>⌂</b><span>Início</span></button>
    <button class="tab-btn" data-tab="history"><b>◴</b><span>Histórico</span></button>
    <button class="tab-btn" data-tab="favorites"><b>★</b><span>Favoritos</span></button>
    <button class="tab-btn" data-tab="profile"><b>☻</b><span>Perfil</span></button>
  </nav>
  <script>
    (()=>{"use strict";
      const tg=window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null,qs=new URLSearchParams(location.search),apiBase=location.origin,user=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user:{},view=document.getElementById("view"),subtitle=document.getElementById("subtitle"),searchForm=document.getElementById("searchForm"),searchInput=document.getElementById("searchInput"),backBtn=document.getElementById("backBtn"),refreshBtn=document.getElementById("refreshBtn"),MAX_CHAPTERS_BATCH=150,cache=new Map();
      const userId=safeText(qs.get("user_id")||user.id||"guest")||"guest";
      const state={route:normalizeRoute(qs.get("route"),qs),previousRoute:"home",titleId:safeId(qs.get("title_id")||qs.get("id")||qs.get("novel_id")),chapterId:safeId(qs.get("chapter_id")||qs.get("read")||qs.get("cap")),currentTitle:null,currentChapter:null,currentPages:[],currentPage:1,readerScrollPercent:0,saveTimer:0,chapterQuery:"",chapterVisible:MAX_CHAPTERS_BATCH,readerFont:clampNumber(Number(localStorage.getItem("novel_reader_font")||18),15,27),readerDark:localStorage.getItem("novel_reader_dark")!=="0",lastAction:()=>renderHome()};
      const storage={get(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch(_){return f}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(_){}}},localProgressKey=`novel_progress:${userId}`,localFavoritesKey=`novel_favorites:${userId}`;
      initTelegram();window.onerror=(_m,_s,_l,_c,e)=>{showError(e||new Error("Erro inesperado na tela."));return true};window.onunhandledrejection=e=>showError(e.reason||new Error("Falha inesperada ao carregar."));
      function initTelegram(){if(!tg)return;try{tg.ready();tg.expand();tg.setHeaderColor("#080713");tg.setBackgroundColor("#060711")}catch(_){}try{tg.BackButton.onClick(handleBack);updateTelegramBackButton()}catch(_){}}
      function haptic(t="light"){try{tg&&tg.HapticFeedback&&tg.HapticFeedback.impactOccurred(t)}catch(_){}}
      function normalizeRoute(r,p){const v=String(r||"").toLowerCase();if(p.get("chapter_id")||p.get("read")||p.get("cap"))return"reader";if(["detail","chapters","title"].includes(v))return v==="title"?"detail":v;if(["reader","search","history","favorites","profile","home"].includes(v))return v;if(p.get("title_id")||p.get("id")||p.get("novel_id"))return"detail";return"home"}
      function safeText(v){return String(v==null?"":v).trim()}function safeId(v){return safeText(v).replace(/[\u0000-\u001f]/g,"").slice(0,240)}function escapeHtml(v){return safeText(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}function clampNumber(v,min,max){const n=Number.isFinite(v)?v:min;return Math.min(max,Math.max(min,n))}function cloneValue(v){try{return JSON.parse(JSON.stringify(v))}catch(_){return v}}function debounce(fn,w=220){let t=0;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),w)}}

      async function renderHistory(){state.lastAction=()=>renderHistory();setRoute("history","Histórico");setActiveTab("history");setLoading("Carregando histórico");const localProgress=storage.get(localProgressKey,{});let items=Object.values(localProgress).sort((a,b)=>Number(b.updated_at||0)-Number(a.updated_at||0));if(userId!=="guest"){const remote=await api(`/api/history?user_id=${encodeURIComponent(userId)}&limit=120`,{timeout:14000,ttl:30000}).catch(()=>null);if(remote&&Array.isArray(remote.items)&&remote.items.length)items=remote.items}if(!items.length){view.innerHTML=emptyHtml("Seu histórico está vazio.","Comece uma leitura e seu progresso aparecerá aqui.");return}view.innerHTML=`<section class="section"><div class="section-head"><h2 class="section-title">Histórico</h2><span class="section-count">${items.length}</span></div><div class="chapters-panel"><div class="chapter-list">${items.map((it,i)=>`<button class="history-row" data-history-chapter="${escapeHtml(safeId(it.chapter_id))}" data-history-title="${escapeHtml(safeId(it.title_id))}" style="animation-delay:${Math.min(i*8,160)}ms">${imageOrFallback(it.cover_url,it.title_name||"Novel","history-thumb")}<div class="chapter-info"><strong>${escapeHtml(it.title_name||"Novel")}</strong><span>Cap. ${escapeHtml(it.chapter_number||"?")} · pág. ${escapeHtml(it.page_index||1)}/${escapeHtml(it.total_pages||1)}</span></div><div class="chapter-arrow">›</div></button>`).join("")}</div></div></section>`;view.querySelectorAll("[data-history-chapter]").forEach(b=>b.addEventListener("click",()=>openReader(b.dataset.historyChapter,b.dataset.historyTitle).catch(showError)))}
      async function renderFavorites(){state.lastAction=()=>renderFavorites();setRoute("favorites","Favoritos");setActiveTab("favorites");setLoading("Carregando favoritos");let favs=Object.values(storage.get(localFavoritesKey,{}));if(userId!=="guest"){const remote=await api(`/api/favorites?user_id=${encodeURIComponent(userId)}`,{timeout:14000,ttl:30000}).catch(()=>null);if(remote&&Array.isArray(remote.items))favs=remote.items}view.innerHTML=favs.length?gridSection("Favoritos",favs):emptyHtml("Nenhum favorito ainda.","Toque em Favoritar na página de uma obra para salvar aqui.");bindCards()}
      async function renderProfile(){state.lastAction=()=>renderProfile();setRoute("profile","Perfil");setActiveTab("profile");setLoading("Carregando perfil");const lp=storage.get(localProgressKey,{}),lf=storage.get(localFavoritesKey,{});let stats={favorites_count:Object.keys(lf).length,chapters_read:Object.values(lp).length,titles_opened:Object.keys(lp).length,pages_read:Object.values(lp).reduce((s,it)=>s+Number(it.page_index||1),0),offline_access:{}};if(userId!=="guest")stats=await api(`/api/profile?user_id=${encodeURIComponent(userId)}`,{timeout:14000,ttl:30000}).catch(()=>stats);const access=stats.offline_access||{};view.innerHTML=`<section class="section"><div class="section-head"><h2 class="section-title">Perfil</h2><span class="section-count">ID ${escapeHtml(userId)}</span></div><div class="stats"><div class="stat"><div class="stat-value">${escapeHtml(stats.favorites_count||0)}</div><span class="stat-label">Favoritos</span></div><div class="stat"><div class="stat-value">${escapeHtml(stats.chapters_read||0)}</div><span class="stat-label">Caps lidos</span></div><div class="stat"><div class="stat-value">${escapeHtml(stats.titles_opened||0)}</div><span class="stat-label">Obras</span></div><div class="stat"><div class="stat-value">${escapeHtml(stats.pages_read||0)}</div><span class="stat-label">Páginas</span></div></div></section><section class="soft-panel"><div class="chapter-row" style="cursor:default"><div class="chapter-num">${access.is_active?"✓":"!"}</div><div class="chapter-info"><strong>Leitura offline</strong><span>${access.is_active?"PDF e EPUB liberados":"Sem plano ativo"}</span></div><div class="chapter-arrow" style="color:${access.is_active?"var(--green)":"var(--muted)"}">●</div></div></section>`}
      function showError(e){const msg=safeText(e&&e.message?e.message:e)||"Não consegui carregar esta tela.";view.innerHTML=`<div class="error-box"><span class="empty-icon">⚡</span><div class="empty-text">Algo saiu do roteiro</div><div class="empty-sub">${escapeHtml(msg)}</div><button class="retry-btn" id="retryBtn">↻ Tentar novamente</button><button class="retry-btn" id="homeRetryBtn" style="background:rgba(255,255,255,.08);border:1px solid var(--line)">Voltar ao início</button></div>`;document.getElementById("retryBtn")?.addEventListener("click",()=>Promise.resolve(state.lastAction()).catch(showError));document.getElementById("homeRetryBtn")?.addEventListener("click",()=>renderHome().catch(showError))}
      async function syncLocal(){if(userId==="guest")return;const progress=Object.values(storage.get(localProgressKey,{})),favorites=Object.values(storage.get(localFavoritesKey,{}));if(progress.length)await api("/api/progress/sync",{method:"POST",body:JSON.stringify({user_id:userId,progress}),timeout:9000}).catch(()=>null);if(favorites.length)await api("/api/favorites/sync",{method:"POST",body:JSON.stringify({user_id:userId,favorites}),timeout:9000}).catch(()=>null)}
      function handleBack(){haptic("light");if(state.route==="reader"&&state.titleId){openTitle(state.titleId).catch(showError);return}if(state.route!=="home"){renderHome().catch(showError);return}try{if(tg)tg.close()}catch(_){}}
      searchForm.addEventListener("submit",e=>{e.preventDefault();renderSearch(searchInput.value).catch(showError)});searchInput.addEventListener("input",debounce(()=>{const q=searchInput.value.trim();if(q.length>=3)renderSearch(q).catch(showError)},520));window.addEventListener("scroll",scheduleSaveProgress,{passive:true});backBtn.addEventListener("click",handleBack);refreshBtn.addEventListener("click",async()=>{haptic("light");cache.clear();await api("/api/refresh",{method:"POST"}).catch(()=>null);Promise.resolve(state.lastAction()).catch(showError)});document.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",()=>{const tab=b.dataset.tab;haptic("light");if(tab==="home")renderHome().catch(showError);if(tab==="history")renderHistory().catch(showError);if(tab==="favorites")renderFavorites().catch(showError);if(tab==="profile")renderProfile().catch(showError)}));
      async function boot(forceHome=false){syncLocal().catch(()=>null);if(!forceHome&&state.route==="reader"&&state.chapterId)return openReader(state.chapterId,state.titleId);if(!forceHome&&state.titleId&&["detail","chapters"].includes(state.route))return openTitle(state.titleId);if(!forceHome&&state.route==="history")return renderHistory();if(!forceHome&&state.route==="favorites")return renderFavorites();if(!forceHome&&state.route==="profile")return renderProfile();return renderHome()}
      boot().catch(showError);
    })();
  </script>
</body>
</html>
